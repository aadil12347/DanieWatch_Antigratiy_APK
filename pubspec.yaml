name: daniewatch_app
description: DanieWatch - Native Android streaming catalog app
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase removed - Migrated to GitHub
  http: ^1.2.2
  supabase_flutter: ^2.8.1
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP / TMDB API client
  dio: ^5.8.0

  # Local database (SQLite - offline-first)
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Lightweight KV storage
  shared_preferences: ^2.3.4

  # Images (native cached, hardware decoded)
  cached_network_image: ^3.4.1

  # UI / Animations
  shimmer: ^3.0.0

  # External URL launcher (for fallback / share)
  url_launcher: ^6.3.1

  # Icons
  cupertino_icons: ^1.0.8

  # Serialization
  google_fonts: ^8.0.2
  flutter_inappwebview: ^6.1.5

  # Download management
  flutter_downloader: ^1.11.8
  permission_handler: ^11.3.1
  open_file: ^3.5.10

  # FFmpeg for .ts → .mp4 concat only (min = smaller APK)
  ffmpeg_kit_flutter_new_min: ^3.1.0

  # Network connectivity monitoring (auto-pause/resume downloads)
  connectivity_plus: ^6.1.4

  # Notification progress for downloads
  flutter_local_notifications: ^18.0.1

  # UUID for unique download IDs
  uuid: ^4.5.1
  better_player_plus: ^1.1.5

  # AES-256-GCM decryption for Bysebuho API
  cryptography: ^2.7.0
  youtube_player_iframe: ^5.2.2
  share_plus: ^12.0.2
  volume_controller: ^3.4.4
  flutter_native_splash: ^2.4.7
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  intl: ^0.20.2

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  test: ^1.24.9
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

  supabase: any
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo_padded.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo_padded.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/logo_padded.png"
  android_12:
    color: "#000000"
    image: "assets/logo_padded.png"
    icon_background_color: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo.svg
    - assets/html/
    - poster/

dependency_overrides:
  objective_c:
    path: ./objective_c_fixed
  sqlite3: 3.0.0
