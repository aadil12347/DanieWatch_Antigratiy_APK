name: Generate Catalog Pages

on:
  push:
    paths:
      - 'items/**'
      - 'posting_record.json'
      - 'Top 5/**'
      - 'Top 10/**'
      - 'index.json'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate paginated catalog
        run: python scripts/generate_catalog.py --repo-root . --output-dir ./catalog --page-size 50

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/
          git diff --staged --quiet || git commit -m "Auto-generate paginated catalog [skip ci]"
          git push
