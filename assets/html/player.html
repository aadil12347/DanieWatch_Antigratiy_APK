                showNotify('Screen Locked');
                lockBtn.classList.add('show');
                if (lockHideTimer) clearTimeout(lockHideTimer);
                lockHideTimer = setTimeout(() => { lockBtn.classList.remove('show'); }, 3000);
            } else {
                overlay.classList.remove('active');
                lockBtn.classList.remove('show');
                showControls();
                showNotify('Screen Unlocked');
            }
        }

        // ===== SPEED =====
        function setSpeed(speed) {
            currentSpeed = speed;
            video.playbackRate = speed;
            document.getElementById('speedValueText').textContent = speed + 'x';
            var speedBtn = document.getElementById('speedBtnLabel'); if (speedBtn) speedBtn.textContent = speed + 'x';
            renderSpeedOptions();
            setTimeout(showMainMenu, 200);
        }

        function renderSpeedOptions() {
            const list = document.getElementById('speedOptionsList');
            list.innerHTML = '';
            speedOptions.forEach((s) => {
                const el = document.createElement('div');
                el.className = 'menu-option' + (currentSpeed === s ? ' selected' : '');
                el.innerHTML = '<span class="menu-option-text">' + s + 'x</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                el.onclick = () => setSpeed(s);
                list.appendChild(el);
            });
        }

        // ===== ASPECT RATIO MENU =====
        function selectAspect(index) {
            currentAspect = index;
            applyAspect();
            renderAspectOptions();
            setTimeout(showMainMenu, 200);
        }

        function renderAspectOptions() {
            const list = document.getElementById('aspectOptionsList');
            list.innerHTML = '';
            aspectLabels.forEach((label, i) => {
                const el = document.createElement('div');
                el.className = 'menu-option' + (currentAspect === i ? ' selected' : '');
                el.innerHTML = '<span class="menu-option-text">' + label + '</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                el.onclick = () => selectAspect(i);
                list.appendChild(el);
            });
        }

        // ===== SUBTITLE CONTROLS =====
        function toggleSubtitlePanel(e) {
            if (e) e.stopPropagation();
            // Close settings menu if open
            if (isMenuOpen) {
                isMenuOpen = false;
                document.getElementById('settings-menu').classList.remove('visible');
            }
            isSubPanelOpen = !isSubPanelOpen;
            const panel = document.getElementById('subtitlePanel');
            if (isSubPanelOpen) {
                panel.classList.add('visible');
                clearTimeout(controlsTimeout);
            } else {
                panel.classList.remove('visible');
                startHideTimer();
            }
        }

        function toggleSubtitles() {
            subtitlesEnabled = !subtitlesEnabled;
            const toggle = document.getElementById('subToggleSwitch');
            if (subtitlesEnabled) {
                toggle.classList.add('active');
            } else {
                toggle.classList.remove('active');
            }
            // Toggle subtitle track in hls
            if (hls) {
                hls.subtitleDisplay = subtitlesEnabled;
                if (!subtitlesEnabled) hls.subtitleTrack = -1;
                else if (hls.subtitleTracks && hls.subtitleTracks.length > 0) hls.subtitleTrack = 0;
            }
            // Toggle native text tracks
            for (let i = 0; i < video.textTracks.length; i++) {
                video.textTracks[i].mode = subtitlesEnabled ? 'showing' : 'hidden';
            }
        }

        function changeSubSize(delta) {
            subtitleSize = Math.max(10, Math.min(32, subtitleSize + delta));
            document.getElementById('subSizeLabel').textContent = subtitleSize;
            applySubtitleStyle();
        }

        function cycleSubColor() {
            subColorIndex = (subColorIndex + 1) % subColors.length;
            document.getElementById('subColorLabel').textContent = subColorNames[subColorIndex];
            applySubtitleStyle();
        }

        function cycleSubBg() {
            subBgIndex = (subBgIndex + 1) % subBgs.length;
            document.getElementById('subBgLabel').textContent = subBgNames[subBgIndex];
            applySubtitleStyle();
        }

        function applySubtitleStyle() {
            // Apply via ::cue styling dynamically
            let style = document.getElementById('sub-style-tag');
            if (!style) {
                style = document.createElement('style');
                style.id = 'sub-style-tag';
                document.head.appendChild(style);
            }
            style.textContent = 'video::cue { color: ' + subColors[subColorIndex] + '; font-size: ' + subtitleSize + 'px; background: ' + subBgs[subBgIndex] + '; font-family: Inter, sans-serif; }';
        }

        // ===== NOTIFY PILL =====
        function showNotify(text) {
            const pill = document.getElementById('notifyPill');
            pill.textContent = text;
            pill.style.opacity = '1';
            setTimeout(() => { pill.style.opacity = '0'; }, 1500);
        }

        // ===== TIME FORMAT =====
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '00:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const mm = String(m).padStart(2, '0');
            const ss = String(s).padStart(2, '0');
            if (h > 0) return String(h) + ':' + mm + ':' + ss;
            return mm + ':' + ss;
        }

        // ===== TIME UPDATE =====
        video.addEventListener('timeupdate', () => {
            if (isScrubbing) return;
            const perc = (video.currentTime / video.duration) * 100;
            seekProgress.style.width = perc + '%';
            seekThumb.style.left = perc + '%';
            timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);

            // Update mini progress bar
            if (miniProgressFill) miniProgressFill.style.width = perc + '%';

            // Next episode check (last 30 seconds for TV shows)
            if (mediaType && mediaType.toLowerCase() !== 'movie' && video.duration && !nextEpTriggered) {
                const remaining = video.duration - video.currentTime;
                if (remaining < 30 && remaining > 0) {
                    triggerNextEpisodeCountdown();
                }
            }
        });

        // ===== BUFFER UPDATE =====
        video.addEventListener('progress', () => {
            if (video.buffered.length > 0) {
                const bufEnd = video.buffered.end(video.buffered.length - 1);
                const bufPerc = (bufEnd / video.duration) * 100;
                seekBuffer.style.width = bufPerc + '%';
            }
        });

        // ===== SEEK BAR =====
        function getSeekPercent(e) {
            const rect = seekBar.getBoundingClientRect();
            let clientX;
            if (e.touches && e.touches.length > 0) clientX = e.touches[0].clientX;
            else if (e.changedTouches && e.changedTouches.length > 0) clientX = e.changedTouches[0].clientX;
            else clientX = e.clientX;
            if (clientX === undefined) return -1;
            return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        }

        seekBarContainer.addEventListener('mousedown', startScrub);
        seekBarContainer.addEventListener('touchstart', startScrub, { passive: false });

        function startScrub(e) {
            e.stopPropagation();
            if (e.cancelable) e.preventDefault(); // Prevent WebView page scroll/wiggle
            isScrubbing = true;
            seekBarContainer.classList.add('scrubbing');
            // Hide overlaying controls during seek preview
            headline.classList.remove('visible');
            centerControls.classList.remove('visible');
            topGradient.classList.remove('visible');
            clearTimeout(controlsTimeout);
            
            const marker = document.getElementById('seekMarker');
            if (marker && video.duration > 0) {
                marker.style.left = ((video.currentTime / video.duration) * 100) + '%';
                marker.style.display = 'block';
            }
            const previewProg = document.getElementById('seekPreviewProgress');
            if (previewProg) previewProg.style.display = 'block';
            
            updateScrub(e);
            document.addEventListener('mousemove', updateScrub);
            document.addEventListener('mouseup', endScrub);
            document.addEventListener('touchmove', updateScrub, { passive: false });
            document.addEventListener('touchend', endScrub);
        }

        function updateScrub(e) {
            if (!isScrubbing) return;
            if (e.cancelable) e.preventDefault(); // Prevent page scroll/wiggle during drag
            const pct = getSeekPercent(e);
            if (pct < 0) return;
            const p = pct * 100;
            const previewProg = document.getElementById('seekPreviewProgress');
            if (previewProg) previewProg.style.width = p + '%';
            seekThumb.style.left = p + '%';
            const previewTime = pct * (video.duration || 0);

            // Thumbnail preview above seek bar (single time display, no tooltip)
            const barRect = seekBar.getBoundingClientRect();
            const thumbX = (p / 100) * barRect.width;
            const clampedX = Math.max(85, Math.min(barRect.width - 85, thumbX));
            seekThumbnailContainer.style.left = clampedX + 'px';
            seekThumbnailContainer.classList.add('visible');
            seekThumbnailTime.textContent = formatTime(previewTime);
            // Offset line to point at actual seek position on progress bar
            if (seekThumbnailLine) seekThumbnailLine.style.left = (thumbX - clampedX) + 'px';
            capturePreviewFrame(previewTime);

            // Hide seek tooltip — thumbnail time is the single source
            seekTooltip.classList.remove('visible');
        }

        function endScrub(e) {
            if (!isScrubbing) return;
            const pct = getSeekPercent(e);
            if (pct >= 0) video.currentTime = pct * (video.duration || 0);
            isScrubbing = false;
            lastScrubTime = Date.now();
            seekBarJustEnded = Date.now(); // Guard: prevent toggleControls from hiding UI immediately
            seekBarContainer.classList.remove('scrubbing');
            seekTooltip.classList.remove('visible');
            seekThumbnailContainer.classList.remove('visible');
            if (seekThumbnailLine) seekThumbnailLine.style.left = '0';
            
            const marker = document.getElementById('seekMarker');
            if (marker) marker.style.display = 'none';
            const previewProg = document.getElementById('seekPreviewProgress');
            if (previewProg) previewProg.style.display = 'none';
            
            document.removeEventListener('mousemove', updateScrub);
            document.removeEventListener('mouseup', endScrub);
            document.removeEventListener('touchmove', updateScrub);
            document.removeEventListener('touchend', endScrub);
            // Restore all controls including headline and center
            showControls();
        }

        seekBarContainer.addEventListener('click', function (e) {
            e.stopPropagation();
            if (Date.now() - lastScrubTime < 300) return;
            const pct = getSeekPercent(e);
            if (pct >= 0) video.currentTime = pct * (video.duration || 0);
            showControls();
        });

        // ===== SETTINGS MENU =====
        function toggleMenu(e) {
            if (e) e.stopPropagation();
            // Close subtitle panel if open
            if (isSubPanelOpen) {
                isSubPanelOpen = false;
                document.getElementById('subtitlePanel').classList.remove('visible');
            }
            const menu = document.getElementById('settings-menu');
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                showMainMenu();
                menu.classList.add('visible');
                clearTimeout(controlsTimeout);
            } else {
                menu.classList.remove('visible');
                startHideTimer();
            }
        }

        function showMainMenu() {
            document.getElementById('menuMain').classList.remove('hidden-view');
            document.getElementById('menuQuality').classList.remove('active-view');
            document.getElementById('menuAudio').classList.remove('active-view');
            document.getElementById('menuSpeed').classList.remove('active-view');
            document.getElementById('menuAspect').classList.remove('active-view');
        }

        function showSubMenu(type) {
            document.getElementById('menuMain').classList.add('hidden-view');
            if (type === 'quality') document.getElementById('menuQuality').classList.add('active-view');
            else if (type === 'audio') document.getElementById('menuAudio').classList.add('active-view');
            else if (type === 'speed') { document.getElementById('menuSpeed').classList.add('active-view'); renderSpeedOptions(); }
            else if (type === 'aspect') { document.getElementById('menuAspect').classList.add('active-view'); renderAspectOptions(); }
        }

        function selectQuality(index) {
            selectedQualityIndex = index;
            hls.currentLevel = index;
            const text = index === -1 ? 'Auto' : qualityLevels[index].height + 'p';
            document.getElementById('qualityValueText').textContent = text;
            renderQualityOptions();
            setTimeout(showMainMenu, 200);
        }

        function selectAudio(index) {
            selectedAudioIndex = index;
            hls.audioTrack = index;
            const track = audioTracks[index];
            document.getElementById('audioValueText').textContent = track.name || track.lang || ('Audio ' + (index + 1));
            renderAudioOptions();
            setTimeout(showMainMenu, 200);
        }

        function renderQualityOptions() {
            const list = document.getElementById('qualityOptionsList');
            list.innerHTML = '';
            const autoEl = document.createElement('div');
            autoEl.className = 'menu-option' + (selectedQualityIndex === -1 ? ' selected' : '');
            autoEl.innerHTML = '<span class="menu-option-text">Auto</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
            autoEl.onclick = () => selectQuality(-1);
            list.appendChild(autoEl);
            qualityLevels.forEach((l, i) => {
                const el = document.createElement('div');
                el.className = 'menu-option' + (selectedQualityIndex === i ? ' selected' : '');
                el.innerHTML = '<span class="menu-option-text">' + l.height + 'p</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                el.onclick = () => selectQuality(i);
                list.appendChild(el);
            });
        }

        function renderAudioOptions() {
            const list = document.getElementById('audioOptionsList');
            list.innerHTML = '';
            audioTracks.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = 'menu-option' + (selectedAudioIndex === i ? ' selected' : '');
                const label = t.name || t.lang || ('Audio ' + (i + 1));
                el.innerHTML = '<span class="menu-option-text">' + label + '</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                el.onclick = () => selectAudio(i);
                list.appendChild(el);
            });
        }

        // ===== NEXT EPISODE =====
        function triggerNextEpisodeCountdown() {
            if (nextEpTriggered) return;
            nextEpTriggered = true;
            nextEpCountdown = 5;
            document.getElementById('nextEpCountdownText').textContent = nextEpCountdown;
            document.getElementById('nextEpisodeOverlay').classList.add('visible');

            nextEpisodeTimer = setInterval(() => {
                nextEpCountdown--;
                document.getElementById('nextEpCountdownText').textContent = nextEpCountdown;
                const deg = ((5 - nextEpCountdown) / 5) * 360;
                document.getElementById('nextEpCountdownFill').style.transform = 'rotate(' + deg + 'deg)';
                if (nextEpCountdown <= 0) {
                    clearInterval(nextEpisodeTimer);
                    playNextEpisode();
                }
            }, 1000);
        }

        function playNextEpisode() {
            if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }
            document.getElementById('nextEpisodeOverlay').classList.remove('visible');
            savePlaybackPosition();
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('playNextEpisode');
            }
        }

        function cancelNextEpisode(e) {
            if (e) { e.stopPropagation(); e.preventDefault(); }
            if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }
            document.getElementById('nextEpisodeOverlay').classList.remove('visible');
            nextEpTriggered = true; // Don't trigger again
        }



        // ===== CONTROL VISIBILITY (3s auto-hide) =====
        function showControls() {
            if (isLocked) return;
            if (isInPipMode) return;
            clearTimeout(controlsTimeout);
            controlsVisible = true;
            controlsBar.classList.add('visible');
            dimmer.classList.add('visible');
            topGradient.classList.add('visible');
            headline.classList.add('visible');
            centerControls.classList.add('visible');
            if (!video.paused && !isMenuOpen && !isSubPanelOpen) {
                startHideTimer();
            }
        }

        function startHideTimer() {
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!video.paused && !isMenuOpen && !isSubPanelOpen && !isScrubbing) {
                    hideUI();
                }
            }, 3000);
        }

        function toggleControls() {
            // Guard: don't hide controls immediately after a seek just finished
            if (seekBarJustEnded && (Date.now() - seekBarJustEnded) < 500) {
                seekBarJustEnded = 0;
                return;
            }
            if (controlsVisible) hideUI();
            else showControls();
        }

        function hideUI() {
            clearTimeout(controlsTimeout);
            controlsVisible = false;
            controlsBar.classList.remove('visible');
            dimmer.classList.remove('visible');
            topGradient.classList.remove('visible');
            headline.classList.remove('visible');
            centerControls.classList.remove('visible');
            if (isMenuOpen) {
                isMenuOpen = false;
                document.getElementById('settings-menu').classList.remove('visible');
            }
            if (isSubPanelOpen) {
                isSubPanelOpen = false;
                document.getElementById('subtitlePanel').classList.remove('visible');
            }
        }

        // ===== LOADERS =====
        function showLoader() {
            document.getElementById('player-loader').style.display = 'block';
            // Hide center controls to prevent overlap with spinner
            centerControls.style.opacity = '0';
            centerControls.style.pointerEvents = 'none';
        }
        function hideLoader() {
            document.getElementById('player-loader').style.display = 'none';
            // Restore center controls visibility if controls are shown
            if (controlsVisible) {
                centerControls.style.opacity = '';
                centerControls.style.pointerEvents = '';
            }
        }

        video.addEventListener('waiting', showLoader);
        video.addEventListener('canplay', hideLoader);

        // ===== SETUP PICKERS =====
        function setupAudioPicker(tracks) {
            if (!tracks || tracks.length < 1) return;
            audioTracks = tracks;
            selectedAudioIndex = 0;
            document.getElementById('audioMenuItem').classList.remove('hidden');
            document.getElementById('audioValueText').textContent = tracks[0].name || tracks[0].lang || 'Default';
            renderAudioOptions();
        }

        function setupQualityPicker(levels) {
            if (!levels || levels.length < 1) return;
            qualityLevels = levels;
            selectedQualityIndex = -1;
            document.getElementById('qualityMenuItem').classList.remove('hidden');
            document.getElementById('qualityValueText').textContent = 'Auto';
            renderQualityOptions();
        }

        // ===== VIDEO ENDED — FULL-SCREEN AUTO-PLAY =====
        video.addEventListener('ended', () => {
            savePlaybackPosition();
            if (mediaType && mediaType.toLowerCase() !== 'movie' && nextEpisodeTitle) {
                showAutoplayOverlay();
            }
        });

        function showAutoplayOverlay() {
            // Hide the small card overlay if visible
            document.getElementById('nextEpisodeOverlay').classList.remove('visible');
            if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }

            autoplayCount = 5;
            const overlay = document.getElementById('autoplayFullscreen');
            const ring = document.getElementById('autoplayRingFill');
            const countText = document.getElementById('autoplayCountText');
            const titleEl = document.getElementById('autoplayTitle');

            titleEl.textContent = nextEpisodeTitle || 'Next Episode';
            countText.textContent = autoplayCount;
            ring.style.strokeDashoffset = '283';
            overlay.classList.add('visible');
            haptic('medium');

            autoplayTimer = setInterval(() => {
                autoplayCount--;
                countText.textContent = autoplayCount;
                // 283 is the circumference of r=45 circle (2 * PI * 45)
                const progress = (5 - autoplayCount) / 5;
                ring.style.strokeDashoffset = (283 * (1 - progress)).toString();

                if (autoplayCount <= 0) {
                    clearInterval(autoplayTimer);
                    autoplayTimer = null;
                    overlay.classList.remove('visible');
                    playNextEpisode();
                }
            }, 1000);
        }

        function cancelAutoplay(e) {
            if (e) { e.stopPropagation(); e.preventDefault(); }
            haptic('light');
            if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
            document.getElementById('autoplayFullscreen').classList.remove('visible');
        }

        // Pinch-to-zoom removed

        // ===== PIP MODE UI =====
        let isInPipMode = false;

        window.enterPipModeUI = function () {
            isInPipMode = true;
            document.querySelector('.video-container').classList.add('pip-mode');
            hideUI();
            // Cancel any pending timers
            if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }
            if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
            document.getElementById('nextEpisodeOverlay').classList.remove('visible');
            document.getElementById('autoplayFullscreen').classList.remove('visible');
            document.getElementById('settings-menu').classList.remove('visible');
            document.getElementById('subtitlePanel').classList.remove('visible');
            isMenuOpen = false;
            isSubPanelOpen = false;
        };

        window.exitPipModeUI = function () {
            isInPipMode = false;
            document.querySelector('.video-container').classList.remove('pip-mode');
            showControls();
        };

        // ===== SYSTEM VOLUME CONTROL =====
        // Keep video internal volume at max; system volume controls actual loudness
        video.volume = 1.0;
        video.muted = false;
        let savedVolumeBeforeMute = 1.0;

        // Called by Flutter to sync system volume level
        window.initSystemVolume = function(level) {
            gestureVolume = Math.max(0, Math.min(1, level));
            var fill = document.getElementById('volumeFill');
            var label = document.getElementById('volumeLabel');
            if (fill) fill.style.height = (gestureVolume * 100) + '%';
            if (label) label.textContent = Math.round(gestureVolume * 100) + '%';
            if (gestureVolume <= 0.01) {
                iconVolumeUp.classList.add('icon-hidden');
                iconVolumeMuted.classList.remove('icon-hidden');
            } else {
                iconVolumeUp.classList.remove('icon-hidden');
                iconVolumeMuted.classList.add('icon-hidden');
            }
        };

        function sendSystemVolume(vol) {
            try {
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('setSystemVolume', vol);
                }
            } catch(e) {}
        }

        function sendSystemBrightness(brightness) {
            try {
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('setSystemBrightness', brightness);
                }
            } catch(e) {}
        }

        // ===== PUBLIC API =====
        window.playVideo = function (url) { loadVideo(url); };
        window.seekToPosition = function (seconds) {
            if (!seconds || seconds < 5) return;
            // If video is already ready, seek immediately
            if (video.readyState >= 2 && video.duration > 0) {
                video.currentTime = Math.min(seconds, video.duration - 5);
                return;
            }
            // Otherwise wait for canplay event
            var seekHandler = function () {
                video.removeEventListener('canplay', seekHandler);
                if (video.duration > 0) {
                    video.currentTime = Math.min(seconds, video.duration - 5);
                }
            };
            video.addEventListener('canplay', seekHandler);
        };
        window.videoTitle = function (title, episodeLabel) {
            document.getElementById('headlineTitle').innerText = title || '';
            var epEl = document.getElementById('headlineEpisode');
            if (episodeLabel) {
                epEl.innerText = episodeLabel;
                epEl.style.display = 'block';
            } else {
                epEl.innerText = '';
                epEl.style.display = 'none';
            }
        };
        window.updateEpisodeButton = function (text) {
            const btn = document.getElementById('btnEpisodes');
            const span = document.getElementById('episodeButtonText');
            if (span) span.textContent = text;
            if (btn) btn.classList.remove('hidden');
        };

        window.setNextEpisodeInfo = function (title) {
            nextEpisodeTitle = title || '';
            document.getElementById('nextEpTitle').textContent = title || 'Next Episode';
        };

        // Initialize speed and aspect options on load
        renderSpeedOptions();
        renderAspectOptions();
        applySubtitleStyle();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            clearSpriteCache();
            if (previewHls) { previewHls.destroy(); previewHls = null; }
        });

        // Initial state
        showControls();
    </script>
