<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>DanieWatch Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="hls.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            max-height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            position: relative;
            width: 100%;
            height: 100vh;
        }

        /* ===== VIDEO CONTAINER ===== */
        .video-container {
            height: 100vh;
            width: 100%;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: contain;
            transition: object-fit 0.3s ease, transform 0.15s ease;
            transform-origin: center center;
        }

        video.aspect-fill {
            object-fit: cover !important;
        }

        video.aspect-stretch {
            object-fit: fill !important;
        }

        video.aspect-contain {
            object-fit: contain !important;
        }


        /* ===== DIMMER OVERLAY ===== */
        .dimmer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.40);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .dimmer.visible {
            opacity: 1;
        }

        /* ===== TOP GRADIENT ===== */
        .top-gradient {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent);
            z-index: 8;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .top-gradient.visible {
            opacity: 1;
        }

        /* ===== HEADLINE AREA ===== */
        .headline {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .headline.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .back-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.45);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s ease;
        }

        .back-btn:active {
            transform: scale(0.88);
            background: rgba(0, 0, 0, 0.65);
        }

        .back-btn svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        .episode-badge {
            color: #FFFFFF;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
        }

        .headline-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            max-width: 55%;
            pointer-events: none;
        }

        .headline-title {
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .headline-episode {
            color: rgba(255, 255, 255, 0.65);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
            display: none;
        }

        /* ===== CENTER CONTROLS (Play/Pause + Skip) ===== */
        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .center-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .center-btn {
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.50);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .center-btn:active {
            transform: scale(0.88);
            background: rgba(0, 0, 0, 0.7);
        }

        .center-btn svg {
            fill: white;
        }

        .center-btn.play {
            width: 80px;
            height: 80px;
        }

        .center-btn.play svg {
            width: 44px;
            height: 44px;
        }

        .center-btn.skip {
            width: 56px;
            height: 56px;
            background: rgba(0, 0, 0, 0.35);
        }

        .center-btn.skip svg {
            width: 28px;
            height: 28px;
        }

        /* ===== BOTTOM CONTROLS ===== */
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            padding: 0 20px 16px 20px;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .bottom-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ===== SEEK BAR ===== */
        .seek-bar-container {
            width: 100%;
            height: 44px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
            margin-bottom: 6px;
        }

        .seek-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.30);
            border-radius: 2px;
            position: relative;
            transition: height 0.15s ease;
        }

        .seek-bar-container:hover .seek-bar,
        .seek-bar-container:active .seek-bar,
        .seek-bar-container.scrubbing .seek-bar {
            height: 8px;
        }

        .seek-buffer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .seek-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #B81D24;
            border-radius: 2px;
            width: 0%;
            z-index: 1;
        }

        .seek-preview-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 2px;
            width: 0%;
            z-index: 3;
            pointer-events: none;
            display: none;
        }

        .seek-thumb {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 16px;
            height: 16px;
            background: #B81D24;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            box-shadow: 0 0 8px rgba(184, 29, 36, 0.5);
            z-index: 5;
        }

        .seek-bar-container:hover .seek-thumb,
        .seek-bar-container:active .seek-thumb,
        .seek-bar-container.scrubbing .seek-thumb {
            transform: translate(-50%, -50%) scale(1);
        }

        .seek-bar-container.scrubbing .seek-thumb {
            box-shadow: 0 0 16px rgba(184, 29, 36, 0.7), 0 0 32px rgba(184, 29, 36, 0.3);
            transform: translate(-50%, -50%) scale(1.15);
        }

        .seek-tooltip {
            position: absolute;
            bottom: 30px;
            left: 0%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.88);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            z-index: 3;
            transition: opacity 0.15s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .seek-tooltip.visible {
            opacity: 1;
        }

        /* ===== CONTROLS ROW ===== */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .controls-left,
        .controls-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .time-display {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            margin-left: 4px;
        }

        /* ===== BUTTONS ===== */
        .ctrl-btn {
            background: none;
            border: none;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .ctrl-btn:active {
            transform: scale(0.88);
        }

        .ctrl-btn svg {
            width: 26px;
            height: 26px;
            fill: #FFFFFF;
            transition: transform 0.15s ease;
        }

        .speed-label {
            color: white;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .icon-hidden {
            display: none !important;
        }

        .hidden {
            display: none !important;
        }

        .hidden-view {
            display: none !important;
        }

        .active-view {
            display: block !important;
        }

        /* ===== SETTINGS MODAL ===== */
        #settings-menu {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            width: 240px;
            max-height: 60vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            transform: translateY(12px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
        }

        #settings-menu.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        #settings-menu::-webkit-scrollbar {
            width: 0;
        }

        .menu-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .menu-header svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .menu-header span {
            color: white;
            font-size: 15px;
            font-weight: 600;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-item-left svg {
            width: 20px;
            height: 20px;
            fill: rgba(255, 255, 255, 0.7);
        }

        .menu-item-label {
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-item-value {
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .menu-item-value svg {
            width: 16px;
            height: 16px;
            fill: rgba(255, 255, 255, 0.35);
        }

        .menu-sub {
            display: none;
        }

        .menu-sub.active-view {
            display: block;
        }

        .menu-back {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .menu-back:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .menu-back svg {
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.6);
        }

        .menu-back-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .menu-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .menu-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-option.selected {
            background: rgba(184, 29, 36, 0.08);
        }

        .menu-option-text {
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-option.selected .menu-option-text {
            color: #B81D24;
            font-weight: 700;
        }

        .menu-option-check {
            width: 18px;
            height: 18px;
            fill: #B81D24;
            opacity: 0;
        }

        .menu-option.selected .menu-option-check {
            opacity: 1;
        }

        /* ===== PREMIUM LOADING SPINNER (Three-Ring Orbital) ===== */
        #player-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            display: none;
        }

        /* Hide center play/pause controls when spinner is visible */
        #player-loader[style*="display: block"] ~ .center-controls,
        #player-loader[style*="display:block"] ~ .center-controls {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        .spinner {
            width: 56px;
            height: 56px;
            position: relative;
            animation: loaderFadeIn 0.3s ease forwards;
        }

        @keyframes loaderFadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .spinner::before,
        .spinner::after,
        .spinner .ring-inner {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 2.5px solid transparent;
        }

        /* Outer ring - slow, brand red */
        .spinner::before {
            top: 0; left: 0; right: 0; bottom: 0;
            border-top-color: #B81D24;
            border-right-color: rgba(184, 29, 36, 0.3);
            animation: spinOuter 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: drop-shadow(0 0 6px rgba(184, 29, 36, 0.4));
        }

        /* Middle ring - medium, white */
        .spinner::after {
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border-top-color: rgba(255, 255, 255, 0.7);
            border-left-color: rgba(255, 255, 255, 0.2);
            animation: spinMiddle 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse;
        }

        /* Inner ring - fast, brand red pulsing */
        .spinner .ring-inner {
            top: 16px; left: 16px; right: 16px; bottom: 16px;
            border-top-color: #B81D24;
            border-bottom-color: rgba(184, 29, 36, 0.15);
            animation: spinInner 1.0s linear infinite;
            filter: drop-shadow(0 0 4px rgba(184, 29, 36, 0.5));
        }

        @keyframes spinOuter {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes spinMiddle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes spinInner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== NOTIFICATION PILL ===== */
        .notify-pill {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 350;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ===== DOUBLE-TAP SKIP RIPPLE ===== */
        .skip-ripple {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40%;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .skip-ripple.left {
            left: 0;
            border-radius: 0 50% 50% 0;
            background: radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.12), transparent 70%);
        }

        .skip-ripple.right {
            right: 0;
            border-radius: 50% 0 0 50%;
            background: radial-gradient(circle at 70% 50%, rgba(255, 255, 255, 0.12), transparent 70%);
        }

        .skip-ripple.active {
            opacity: 1;
            animation: rippleFade 0.6s ease forwards;
        }

        @keyframes rippleFade {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .skip-text {
            color: white;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .skip-text svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* ===== BRIGHTNESS / VOLUME INDICATORS ===== */
        .gesture-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 160px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            opacity: 0;
            transition: opacity 0.1s ease;
            pointer-events: none;
        }

        .gesture-indicator.visible {
            opacity: 1;
        }

        .gesture-indicator.left {
            left: 48px;
        }

        .gesture-indicator.right {
            right: 48px;
        }

        .gesture-indicator-icon {
            width: 28px;
            height: 28px;
            margin-bottom: 8px;
        }

        .gesture-indicator-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .gesture-indicator-track {
            width: 8px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.4);
        }

        .gesture-indicator-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #B81D24, #E04048);
            border-radius: 4px;
            transition: none;
            box-shadow: 0 0 10px rgba(184, 29, 36, 0.5);
        }

        .gesture-indicator-fill.boost {
            background: linear-gradient(to top, #B81D24, #F59E0B) !important;
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.5) !important;
        }

        .gesture-indicator-label {
            color: white;
            font-size: 12px;
            font-weight: 700;
            margin-top: 6px;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        /* ===== LONG-PRESS SPEED PILL ===== */
        .speed-pill {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px) scale(0.85);
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(184, 29, 36, 0.4);
            color: white;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 201;
            pointer-events: none;
        }

        .speed-pill.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
            animation: speedPillPulse 1.5s ease-in-out infinite;
        }

        @keyframes speedPillPulse {
            0%, 100% { border-color: rgba(184, 29, 36, 0.4); box-shadow: 0 0 12px rgba(184, 29, 36, 0.15); }
            50% { border-color: rgba(184, 29, 36, 0.8); box-shadow: 0 0 20px rgba(184, 29, 36, 0.3); }
        }

        .speed-pill svg {
            width: 18px;
            height: 18px;
            fill: #B81D24;
        }

        /* ===== HORIZONTAL SEEK INDICATOR (center pill for swipe seek) — HIDDEN, replaced by thumbnail preview ===== */
        .seek-indicator {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* ===== THUMBNAIL SEEK PREVIEW (above progress bar) ===== */
        .seek-thumbnail-container {
            position: absolute;
            bottom: 36px;
            z-index: 202;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transform: translateX(-50%) translateY(8px);
            transition: opacity 0.15s ease, transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .seek-thumbnail-container.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .seek-thumbnail-frame {
            width: 160px;
            height: 90px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        .seek-thumbnail-frame canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .seek-thumbnail-time {
            font-size: 13px;
            font-weight: 700;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 3px 10px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
        }

        .seek-thumbnail-line {
            width: 2px;
            height: 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1px;
            position: relative;
            left: 0;
        }

        /* ===== LOCK OVERLAY ===== */
        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 300;
            display: none;
        }

        .lock-overlay.active {
            display: block;
        }

        .lock-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.35s ease, transform 0.2s ease;
        }

        .lock-btn.show {
            opacity: 0.85;
        }

        .lock-btn:active {
            transform: scale(0.88);
        }

        .lock-btn svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        /* ===== NEXT EPISODE OVERLAY ===== */
        .next-episode-overlay {
            position: absolute;
            bottom: 100px;
            right: 24px;
            z-index: 250;
            display: none;
            align-items: center;
            gap: 16px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px 20px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .next-episode-overlay.visible {
            display: flex;
        }

        .next-episode-overlay:active {
            transform: scale(0.96);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .next-ep-countdown {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.15);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .next-ep-countdown-fill {
            position: absolute;
            top: -3px;
            left: -3px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid #B81D24;
            border-right-color: transparent;
            border-bottom-color: transparent;
            transition: transform 0.1s linear;
        }

        .next-ep-countdown-text {
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .next-ep-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .next-ep-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .next-ep-title {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .next-ep-play-icon {
            width: 24px;
            height: 24px;
            fill: #B81D24;
        }

        .next-ep-cancel {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: color 0.2s ease;
        }

        .next-ep-cancel:hover {
            color: white;
        }

        /* ===== FULL-SCREEN AUTO-PLAY OVERLAY (video ended) ===== */
        .autoplay-fullscreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 400;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .autoplay-fullscreen.visible {
            display: flex;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .autoplay-ring {
            width: 100px;
            height: 100px;
            position: relative;
            cursor: pointer;
        }

        .autoplay-ring svg {
            width: 100px;
            height: 100px;
            transform: rotate(-90deg);
        }

        .autoplay-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 4;
        }

        .autoplay-ring-fill {
            fill: none;
            stroke: #B81D24;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            transition: stroke-dashoffset 0.3s linear;
        }

        .autoplay-ring-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            fill: white;
        }

        .autoplay-ring-count {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 700;
        }

        .autoplay-title {
            color: white;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .autoplay-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .autoplay-cancel {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 8px;
        }

        .autoplay-cancel:active {
            transform: scale(0.92);
        }

        .autoplay-cancel:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* ===== SVG MORPH PLAY/PAUSE ===== */
        .center-btn.play svg path {
            transition: d 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .center-btn.play {
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .center-btn.play:active {
            transform: scale(0.82);
        }

        /* Spring micro-animations on all control buttons */
        .ctrl-btn {
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        .ctrl-btn:active {
            transform: scale(0.85) !important;
        }

        .center-btn.skip {
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .center-btn.skip:active {
            transform: scale(0.82);
        }

        /* ===== SUBTITLE STYLING PANEL ===== */
        .subtitle-panel {
            position: absolute;
            bottom: 80px;
            right: 70px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            width: 220px;
            z-index: 100;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            transform: translateY(12px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
            overflow: hidden;
        }

        .subtitle-panel.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .sub-style-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .sub-style-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .sub-style-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
        }

        .sub-style-value {
            color: white;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sub-style-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease;
        }

        .sub-style-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ===== TOGGLE SWITCH ===== */
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s ease;
            flex-shrink: 0;
        }

        .toggle-switch.active {
            background: #B81D24;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .toggle-switch.active::after {
            transform: translateX(20px);
        }

        /* ===== MINI PROGRESS BAR (always visible, YouTube-style) ===== */
        .mini-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            z-index: 6;
            background: rgba(255, 255, 255, 0.12);
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        .mini-progress-fill {
            height: 100%;
            background: #B81D24;
            width: 0%;
            transition: width 0.3s linear;
        }

        /* Hide minibar when controls are visible */
        .bottom-controls.visible ~ .mini-progress {
            opacity: 0;
        }

        /* ===== PLAY BUTTON BREATHING GLOW ===== */
        @keyframes breatheGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(184, 29, 36, 0); }
            50% { box-shadow: 0 0 24px 4px rgba(184, 29, 36, 0.25); }
        }

        .center-btn.play.paused-glow {
            animation: breatheGlow 2.5s ease-in-out infinite;
        }

        /* ===== BOTTOM GRADIENT ENHANCEMENT ===== */
        .bottom-controls::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -20px;
            right: -20px;
            height: 180px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.4) 50%, transparent 100%);
            pointer-events: none;
            z-index: -1;
        }

        /* ===== PIP MODE ===== */
        .pip-mode .headline,
        .pip-mode .center-controls,
        .pip-mode .bottom-controls,
        .pip-mode .top-gradient,
        .pip-mode .dimmer,
        .pip-mode #settings-menu,
        .pip-mode .subtitle-panel,
        .pip-mode .next-episode-overlay,
        .pip-mode .autoplay-fullscreen,
        .pip-mode .lock-overlay,
        .pip-mode .speed-pill,
        .pip-mode .seek-indicator,
        .pip-mode .gesture-indicator,
        .pip-mode .skip-ripple,
        .pip-mode .notify-pill,
        .pip-mode .seek-thumbnail-container,
        .pip-mode .mini-progress,
        .pip-mode #player-loader {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>

<body>
    <div class="video-container" id="videoContainer">
        <video id="video" playsinline></video>
        <video id="previewVideo" playsinline muted style="display:none;position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></video>

        <!-- Loading Spinner (Three-Ring Orbital) -->
        <div id="player-loader">
            <div class="spinner"><div class="ring-inner"></div></div>
        </div>

        <!-- Notification Pill -->
        <div class="notify-pill" id="notifyPill">Fit to Screen</div>

        <!-- Dimmer Overlay -->
        <div class="dimmer" id="dimmer"></div>

        <!-- Double-Tap Skip Ripples -->
        <div class="skip-ripple left" id="skipLeft">
            <div class="skip-text">
                <svg viewBox="0 0 24 24">
                    <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z" />
                </svg>
                <span>15s</span>
            </div>
        </div>
        <div class="skip-ripple right" id="skipRight">
            <div class="skip-text">
                <span>15s</span>
                <svg viewBox="0 0 24 24">
                    <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" />
                </svg>
            </div>
        </div>

        <!-- Brightness Indicator (Left) -->
        <div class="gesture-indicator right" id="brightnessIndicator">
            <div class="gesture-indicator-icon">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z" />
                </svg>
            </div>
            <div class="gesture-indicator-track">
                <div class="gesture-indicator-fill" id="brightnessFill" style="height: 50%"></div>
            </div>
            <span class="gesture-indicator-label" id="brightnessLabel">50%</span>
        </div>

        <!-- Volume Indicator (Right) -->
        <div class="gesture-indicator left" id="volumeIndicator">
            <div class="gesture-indicator-icon">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                </svg>
            </div>
            <div class="gesture-indicator-track">
                <div class="gesture-indicator-fill" id="volumeFill" style="height: 100%"></div>
            </div>
            <span class="gesture-indicator-label" id="volumeLabel">100%</span>
        </div>

        <!-- Long Press Speed Pill -->
        <div class="speed-pill" id="speedPill">
            <svg viewBox="0 0 24 24">
                <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" />
            </svg>
            <span>2x Speed</span>
        </div>

        <!-- Horizontal Seek Indicator -->
        <div class="seek-indicator" id="seekIndicator">
            <span class="seek-delta" id="seekDelta">+00:15</span>
            <span class="seek-time" id="seekTimePreview">01:23</span>
        </div>

        <!-- Top Gradient -->
        <div class="top-gradient" id="topGradient"></div>

        <!-- Headline Area -->
        <div class="headline" id="headline">
            <div style="display: flex; align-items: center; gap: 14px;">
                <button class="back-btn" id="btnBack" onclick="goBack(event)">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                    </svg>
                </button>
            </div>
            <!-- Center: Title + Episode -->
            <div class="headline-center" id="headlineCenter">
                <span class="headline-title" id="headlineTitle"></span>
                <span class="headline-episode" id="headlineEpisode"></span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="ctrl-btn hidden" id="btnEpisodes" onclick="showEpisodes(event)"
                    style="background: rgba(0,0,0,0.5); border-radius: 8px; padding: 0 18px; height: 48px; display: flex; align-items: center; justify-content: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px); width: auto;">
                    <svg viewBox="0 0 24 24" style="width: 24px; height: 24px; fill: white;">
                        <path
                            d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h4v2h-4zm0-6h8v2h-8z" />
                    </svg>
                    <span id="episodeButtonText"
                        style="color: rgba(255,255,255,0.9); font-size: 16px; font-weight: 700; white-space: nowrap; letter-spacing: -0.2px;">Episodes</span>
                </button>
            </div>
        </div>

        <!-- Center Controls (Skip Back + Play/Pause + Skip Forward) -->
        <div class="center-controls" id="centerControls">
            <button class="center-btn skip" onclick="back(event)">
                <svg viewBox="0 0 24 24">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" /><text x="12" y="20" font-size="7" fill="white"
                        text-anchor="middle" font-weight="bold"></text>
                </svg>
            </button>
            <button class="center-btn play" onclick="playPause(event)">
                <svg id="iconPlayCenter" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <svg id="iconPauseCenter" class="icon-hidden" viewBox="0 0 24 24">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
            </button>
            <button class="center-btn skip" onclick="forward(event)">
                <svg viewBox="0 0 24 24">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                </svg>
            </button>
        </div>

        <!-- Lock Overlay -->
        <div class="lock-overlay" id="lockOverlay">
            <button class="lock-btn" id="lockBtn" onclick="toggleLock(event)">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM8.9 6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2H8.9V6z" />
                </svg>
            </button>
        </div>

        <!-- Next Episode Overlay (in-progress card at bottom-right) -->
        <div class="next-episode-overlay" id="nextEpisodeOverlay" onclick="playNextEpisode()">
            <div class="next-ep-countdown">
                <div class="next-ep-countdown-fill" id="nextEpCountdownFill"></div>
                <span class="next-ep-countdown-text" id="nextEpCountdownText">5</span>
            </div>
            <div class="next-ep-info">
                <span class="next-ep-label">Next Episode</span>
                <span class="next-ep-title" id="nextEpTitle">Loading...</span>
            </div>
            <svg class="next-ep-play-icon" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
            </svg>
            <button class="next-ep-cancel" onclick="cancelNextEpisode(event)">Cancel</button>
        </div>

        <!-- Full-Screen Auto-Play Overlay (when video ends) -->
        <div class="autoplay-fullscreen" id="autoplayFullscreen">
            <div class="autoplay-subtitle" id="autoplayLabel">UP NEXT</div>
            <div class="autoplay-ring" onclick="playNextEpisode()">
                <svg viewBox="0 0 100 100">
                    <circle class="autoplay-ring-bg" cx="50" cy="50" r="45" />
                    <circle class="autoplay-ring-fill" id="autoplayRingFill" cx="50" cy="50" r="45" />
                </svg>
                <svg class="autoplay-ring-play" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <span class="autoplay-ring-count" id="autoplayCountText">5</span>
            </div>
            <div class="autoplay-title" id="autoplayTitle">Next Episode</div>
            <button class="autoplay-cancel" onclick="cancelAutoplay(event)">Cancel</button>
        </div>

        <!-- Subtitle Styling Panel -->
        <div class="subtitle-panel" id="subtitlePanel">
            <div class="menu-header" style="cursor: default;">
                <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:white;">
                    <path
                        d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z" />
                </svg>
                <span>Subtitles</span>
            </div>
            <div class="sub-style-row" onclick="toggleSubtitles()">
                <span class="sub-style-label" id="subToggleText">Subtitles</span>
                <div class="toggle-switch active" id="subToggleSwitch"></div>
            </div>
            <div style="border-top: 1px solid rgba(255,255,255,0.06);"></div>
            <div class="sub-style-row">
                <span class="sub-style-label">Size</span>
                <div class="sub-style-value">
                    <button class="sub-style-btn" onclick="changeSubSize(-2)">−</button>
                    <span id="subSizeLabel">18</span>
                    <button class="sub-style-btn" onclick="changeSubSize(2)">+</button>
                </div>
            </div>

    <script>
        const video = document.getElementById('video');
        const controlsBar = document.getElementById('controls');
        const dimmer = document.getElementById('dimmer');
        const topGradient = document.getElementById('topGradient');
        const headline = document.getElementById('headline');
        const centerControls = document.getElementById('centerControls');
        const seekProgress = document.getElementById('seekProgress');
        const seekBuffer = document.getElementById('seekBuffer');
        const seekThumb = document.getElementById('seekThumb');
        const seekBarContainer = document.getElementById('seekBarContainer');
        const seekBar = document.getElementById('seekBar');
        const seekTooltip = document.getElementById('seekTooltip');
        const timeDisplay = document.getElementById('timeDisplay');
        const iconPlayCenter = document.getElementById('iconPlayCenter');
        const iconPauseCenter = document.getElementById('iconPauseCenter');
        const iconVolumeUp = document.getElementById('iconVolumeUp');
        const iconVolumeMuted = document.getElementById('iconVolumeMuted');
        const videoContainer = document.getElementById('videoContainer');
        const previewVideo = document.getElementById('previewVideo');
        const seekThumbnailCanvas = document.getElementById('seekThumbnailCanvas');
        const seekThumbnailCtx = seekThumbnailCanvas.getContext('2d', { alpha: false });
        const seekThumbnailContainer = document.getElementById('seekThumbnailContainer');
        const seekThumbnailTime = document.getElementById('seekThumbnailTime');
        const seekThumbnailLine = document.querySelector('.seek-thumbnail-line');
        const miniProgressFill = document.getElementById('miniProgressFill');

        // ===== WEB AUDIO API — 3x VOLUME BOOST =====
        let audioCtx = null;
        let gainNode = null;
        let audioSourceConnected = false;

        function setupAudioBoost() {
            if (audioSourceConnected) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaElementSource(video);
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 3.0; // Start at 3x (maps to 100%)
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                audioSourceConnected = true;
            } catch (e) {
                console.warn('AudioContext setup failed:', e);
            }
        }

        function setGainVolume(vol01) {
            // vol01 is 0.0-1.0 from gesture; maps to gain 0.0-3.0
            if (gainNode) {
                gainNode.gain.value = vol01 * 3.0;
            }
            // Also control system volume via Flutter
            sendSystemVolume(vol01);
            // Update boost indicator color
            const fill = document.getElementById('volumeFill');
            if (fill) {
                if (vol01 > 0.34) {
                    fill.classList.add('boost');
                } else {
                    fill.classList.remove('boost');
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // ═══════ INSTANT SEEK THUMBNAIL ENGINE (V2 Bulletproof) ═══════
        // ═══════════════════════════════════════════════════════════════

        // --- Configuration ---
        const CAPTURE_W = 160;
        const CAPTURE_H = 90;
        const JPEG_QUALITY = 0.5;
        const MAX_CACHE_FRAMES = 2000;
        const CAPTURE_DELAY_MS = 80;
        const SCRUB_RESUME_DELAY_MS = 500;
        const CACHE_KEY_ROUND = 5; // Round timestamps to nearest 5s for consistent keys

        // --- State ---
        let previewHls = null;
        let previewReady = false;
        let pendingPreviewTime = -1;
        let isPreviewSeeking = false;

        // The sprite cache: Map<roundedTimestamp, HTMLImageElement>
        const spriteCache = new Map();
        // Blob URL tracking for cleanup
        const blobUrls = new Map();
        // Offscreen canvas for capture (never touches the DOM display canvas)
        const captureCanvas = document.createElement('canvas');
        captureCanvas.width = CAPTURE_W;
        captureCanvas.height = CAPTURE_H;
        const captureCtx = captureCanvas.getContext('2d', { willReadFrequently: false });

        // Background capture state
        let captureQueue = [];
        let isCaptureRunning = false;
        let capturePassIndex = 0;
        const PASS_INTERVALS = [60, 30, 10, 5]; // Coarse → Fine

        // --- Preview HLS Setup ---
        function loadPreviewVideo(url) {
            previewReady = false;
            if (previewHls) { previewHls.destroy(); previewHls = null; }
            clearSpriteCache();

            try {
                if (Hls.isSupported()) {
                    previewHls = new Hls({
                        enableWorker: false,
                        lowLatencyMode: false,
                        maxBufferLength: 6,
                        maxMaxBufferLength: 15,
                        startLevel: 0,
                        capLevelToPlayerSize: true,
                        backBufferLength: 60,
                    });
                    previewHls.loadSource(url);
                    previewHls.attachMedia(previewVideo);
                    previewHls.on(Hls.Events.MANIFEST_PARSED, () => {
                        previewReady = true;
                        // Lock to absolute lowest quality
                        previewHls.currentLevel = 0;
                        previewHls.loadLevel = 0;
                        // Start multi-pass background capture
                        startMultiPassCapture();
                    });
                    previewHls.on(Hls.Events.ERROR, (e, data) => {
                        if (data.fatal) {
                            console.warn('[Sprite] Preview HLS fatal error:', data.type);
                            previewReady = false;
                        }
                    });
                }
            } catch (e) {
                console.warn('[Sprite] Preview video load failed:', e);
            }
        }

        // --- Sprite Cache Management ---
        function clearSpriteCache() {
            for (const url of blobUrls.values()) {
                try { URL.revokeObjectURL(url); } catch(e) {}
            }
            spriteCache.clear();
            blobUrls.clear();
            captureQueue = [];
            isCaptureRunning = false;
            capturePassIndex = 0;
        }

        function evictOldestIfNeeded() {
            if (spriteCache.size <= MAX_CACHE_FRAMES) return;
            const oldest = spriteCache.keys().next().value;
            spriteCache.delete(oldest);
            const oldUrl = blobUrls.get(oldest);
            if (oldUrl) { URL.revokeObjectURL(oldUrl); blobUrls.delete(oldest); }
        }

        // --- Multi-Pass Background Capture ---
        function startMultiPassCapture() {
            if (isCaptureRunning) return;
            capturePassIndex = 0;
            startNextPass();
        }

        function startNextPass() {
            if (capturePassIndex >= PASS_INTERVALS.length) {
                isCaptureRunning = false;
                console.log('[Sprite] All passes complete. Total cached: ' + spriteCache.size + ' frames');
                return;
            }

            const waitDur = setInterval(() => {
                const dur = video.duration;
                if (!dur || dur <= 0 || !isFinite(dur)) return;
                clearInterval(waitDur);

                const interval = PASS_INTERVALS[capturePassIndex];
                captureQueue = [];

                for (let t = 0; t < dur; t += interval) {
                    const key = Math.round(t / CACHE_KEY_ROUND) * CACHE_KEY_ROUND;
                    if (!spriteCache.has(key)) {
                        captureQueue.push(t);
                    }
                }

                console.log('[Sprite] Pass ' + (capturePassIndex + 1) + '/' + PASS_INTERVALS.length +
                    ' (every ' + interval + 's): ' + captureQueue.length + ' frames to capture');

                isCaptureRunning = true;
                captureNextFromQueue();
            }, 300);
        }

        function captureNextFromQueue() {
            if (captureQueue.length === 0) {
                capturePassIndex++;
                console.log('[Sprite] Pass ' + capturePassIndex + ' done. Cache size: ' + spriteCache.size);
                setTimeout(startNextPass, 500);
                return;
            }

            if (!previewReady || !previewVideo) {
                isCaptureRunning = false;
                return;
            }

            // YIELD to user scrubbing
            if (isScrubbing) {
                setTimeout(captureNextFromQueue, SCRUB_RESUME_DELAY_MS);
                return;
            }

            const time = captureQueue.shift();
            const cacheKey = Math.round(time / CACHE_KEY_ROUND) * CACHE_KEY_ROUND;

            if (spriteCache.has(cacheKey)) {
                setTimeout(captureNextFromQueue, 10);
                return;
            }

            // Safety timeout: if seeked doesn't fire within 2s, skip this frame
            let didFire = false;
            const safetyTimeout = setTimeout(() => {
                if (!didFire) {
                    didFire = true;
                    console.warn('[Sprite] Seek timeout for t=' + time.toFixed(0) + 's, skipping');
                    setTimeout(captureNextFromQueue, CAPTURE_DELAY_MS);
                }
            }, 2000);

            const onSeeked = () => {
                if (didFire) return;
                didFire = true;
                clearTimeout(safetyTimeout);
                previewVideo.removeEventListener('seeked', onSeeked);

                requestAnimationFrame(() => {
                    try {
                        captureCtx.drawImage(previewVideo, 0, 0, CAPTURE_W, CAPTURE_H);
                        captureCanvas.toBlob((blob) => {
                            if (!blob) {
                                setTimeout(captureNextFromQueue, CAPTURE_DELAY_MS);
                                return;
                            }
                            const imgUrl = URL.createObjectURL(blob);
                            const img = new Image();
                            img.onload = () => {
                                spriteCache.set(cacheKey, img);
                                blobUrls.set(cacheKey, imgUrl);
                                evictOldestIfNeeded();
                                setTimeout(captureNextFromQueue, CAPTURE_DELAY_MS);
                            };
                            img.onerror = () => {
                                URL.revokeObjectURL(imgUrl);
                                setTimeout(captureNextFromQueue, CAPTURE_DELAY_MS);
                            };
                            img.src = imgUrl;
                        }, 'image/jpeg', JPEG_QUALITY);
                    } catch (e) {
                        setTimeout(captureNextFromQueue, CAPTURE_DELAY_MS);
                    }
                });
            };

            previewVideo.addEventListener('seeked', onSeeked, { once: true });
            previewVideo.currentTime = time;
        }

        // --- Instant Frame Serving ---
        function capturePreviewFrame(time) {
            const cacheKey = Math.round(time / CACHE_KEY_ROUND) * CACHE_KEY_ROUND;

            // FAST PATH: Check sprite cache — INSTANT (<1ms)
            const cached = spriteCache.get(cacheKey);
            if (cached && cached.complete) {
                seekThumbnailCtx.drawImage(cached, 0, 0,
                    seekThumbnailCanvas.width, seekThumbnailCanvas.height);
                return;
            }

            // FAST PATH 2: Nearest cached frame — still instant
            const nearest = findNearestCachedFrame(time);
            if (nearest) {
                seekThumbnailCtx.drawImage(nearest, 0, 0,
                    seekThumbnailCanvas.width, seekThumbnailCanvas.height);
            }

            // SLOW PATH: Live seek for exact frame (and cache the result)
            if (!previewReady || !previewVideo) return;

                previewVideo.currentTime = pendingPreviewTime;

        function findNearestCachedFrame(time) {
            if (spriteCache.size === 0) return null;
            let bestKey = -1;
            let bestDist = Infinity;
            const searchRadius = 120;
            const minKey = Math.round((time - searchRadius) / CACHE_KEY_ROUND) * CACHE_KEY_ROUND;
            const maxKey = Math.round((time + searchRadius) / CACHE_KEY_ROUND) * CACHE_KEY_ROUND;

            for (const key of spriteCache.keys()) {
                if (key < minKey || key > maxKey) continue;
                const dist = Math.abs(key - time);
                if (dist < bestDist) {
                    bestDist = dist;
                    bestKey = key;
                }
            }
            if (bestKey >= 0) {
                const img = spriteCache.get(bestKey);
                if (img && img.complete) return img;
            }
            return null;
        }

                    const currentTime = previewVideo.currentTime;
                    const cacheKey = Math.round(currentTime / CACHE_KEY_ROUND) * CACHE_KEY_ROUND;

                // Update volume icon
