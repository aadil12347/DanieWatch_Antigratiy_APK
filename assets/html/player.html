<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>DanieWatch Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="hls.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            max-height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            position: relative;
            width: 100%;
            height: 100vh;
        }

        /* ===== VIDEO CONTAINER ===== */
        .video-container {
            height: 100vh;
            width: 100%;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: contain;
            transition: object-fit 0.3s ease, transform 0.15s ease;
            transform-origin: center center;
        }

        video.aspect-fill {
            object-fit: cover !important;
        }

        video.aspect-stretch {
            object-fit: fill !important;
        }

        video.aspect-contain {
            object-fit: contain !important;
        }

        /* ===== PINCH-TO-ZOOM ===== */
        video.zooming {
            transition: none !important;
        }

        /* ===== DIMMER OVERLAY ===== */
        .dimmer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.40);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .dimmer.visible {
            opacity: 1;
        }

        /* ===== TOP GRADIENT ===== */
        .top-gradient {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent);
            z-index: 8;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .top-gradient.visible {
            opacity: 1;
        }

        /* ===== HEADLINE AREA ===== */
        .headline {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .headline.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .back-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.45);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s ease;
        }

        .back-btn:active {
            transform: scale(0.88);
            background: rgba(0, 0, 0, 0.65);
        }

        .back-btn svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        .episode-badge {
            color: #FFFFFF;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
        }

        /* ===== CENTER CONTROLS (Play/Pause + Skip) ===== */
        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .center-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .center-btn {
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.50);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .center-btn:active {
            transform: scale(0.88);
            background: rgba(0, 0, 0, 0.7);
        }

        .center-btn svg {
            fill: white;
        }

        .center-btn.play {
            width: 80px;
            height: 80px;
        }

        .center-btn.play svg {
            width: 44px;
            height: 44px;
        }

        .center-btn.skip {
            width: 56px;
            height: 56px;
            background: rgba(0, 0, 0, 0.35);
        }

        .center-btn.skip svg {
            width: 28px;
            height: 28px;
        }

        /* ===== BOTTOM CONTROLS ===== */
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 0 20px 16px 20px;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .bottom-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ===== SEEK BAR ===== */
        .seek-bar-container {
            width: 100%;
            height: 32px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
            margin-bottom: 6px;
        }

        .seek-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.30);
            border-radius: 2px;
            position: relative;
            transition: height 0.15s ease;
        }

        .seek-bar-container:hover .seek-bar,
        .seek-bar-container:active .seek-bar {
            height: 6px;
        }

        .seek-buffer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.50);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .seek-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #E11D48;
            border-radius: 2px;
            width: 0%;
        }

        .seek-thumb {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 16px;
            height: 16px;
            background: #E11D48;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.15s ease;
            box-shadow: 0 0 8px rgba(225, 29, 72, 0.5);
            z-index: 2;
        }

        .seek-bar-container:hover .seek-thumb,
        .seek-bar-container:active .seek-thumb,
        .seek-bar-container.scrubbing .seek-thumb {
            transform: translate(-50%, -50%) scale(1);
        }

        .seek-tooltip {
            position: absolute;
            bottom: 30px;
            left: 0%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.88);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            z-index: 3;
            transition: opacity 0.15s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .seek-tooltip.visible {
            opacity: 1;
        }

        /* ===== CONTROLS ROW ===== */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .controls-left,
        .controls-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .time-display {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            margin-left: 4px;
        }

        /* ===== BUTTONS ===== */
        .ctrl-btn {
            background: none;
            border: none;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .ctrl-btn:active {
            transform: scale(0.88);
        }

        .ctrl-btn svg {
            width: 26px;
            height: 26px;
            fill: #FFFFFF;
            transition: transform 0.15s ease;
        }

        .speed-label {
            color: white;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .icon-hidden {
            display: none !important;
        }

        .hidden {
            display: none !important;
        }

        .hidden-view {
            display: none !important;
        }

        .active-view {
            display: block !important;
        }

        /* ===== SETTINGS MODAL ===== */
        #settings-menu {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            width: 240px;
            max-height: 60vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            transform: translateY(12px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
        }

        #settings-menu.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        #settings-menu::-webkit-scrollbar {
            width: 0;
        }

        .menu-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .menu-header svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .menu-header span {
            color: white;
            font-size: 15px;
            font-weight: 600;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-item-left svg {
            width: 20px;
            height: 20px;
            fill: rgba(255, 255, 255, 0.7);
        }

        .menu-item-label {
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-item-value {
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .menu-item-value svg {
            width: 16px;
            height: 16px;
            fill: rgba(255, 255, 255, 0.35);
        }

        .menu-sub {
            display: none;
        }

        .menu-sub.active-view {
            display: block;
        }

        .menu-back {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .menu-back:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .menu-back svg {
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.6);
        }

        .menu-back-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .menu-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .menu-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-option.selected {
            background: rgba(225, 29, 72, 0.08);
        }

        .menu-option-text {
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 500;
        }

        .menu-option.selected .menu-option-text {
            color: #E11D48;
            font-weight: 700;
        }

        .menu-option-check {
            width: 18px;
            height: 18px;
            fill: #E11D48;
            opacity: 0;
        }

        .menu-option.selected .menu-option-check {
            opacity: 1;
        }

        /* ===== LOADING SPINNER ===== */
        #player-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            display: none;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(225, 29, 72, 0.15);
            border-left-color: #E11D48;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== NOTIFICATION PILL ===== */
        .notify-pill {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 350;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ===== DOUBLE-TAP SKIP RIPPLE ===== */
        .skip-ripple {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40%;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .skip-ripple.left {
            left: 0;
            border-radius: 0 50% 50% 0;
            background: radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.12), transparent 70%);
        }

        .skip-ripple.right {
            right: 0;
            border-radius: 50% 0 0 50%;
            background: radial-gradient(circle at 70% 50%, rgba(255, 255, 255, 0.12), transparent 70%);
        }

        .skip-ripple.active {
            opacity: 1;
            animation: rippleFade 0.6s ease forwards;
        }

        @keyframes rippleFade {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .skip-text {
            color: white;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .skip-text svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* ===== BRIGHTNESS / VOLUME INDICATORS ===== */
        .gesture-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 160px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .gesture-indicator.visible {
            opacity: 1;
        }

        .gesture-indicator.left {
            left: 20px;
        }

        .gesture-indicator.right {
            right: 20px;
        }

        .gesture-indicator-icon {
            width: 28px;
            height: 28px;
            margin-bottom: 8px;
        }

        .gesture-indicator-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .gesture-indicator-track {
            width: 6px;
            height: 120px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .gesture-indicator-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #E11D48;
            border-radius: 3px;
            transition: height 0.05s linear;
            box-shadow: 0 0 8px rgba(225, 29, 72, 0.4);
        }

        .gesture-indicator-label {
            color: white;
            font-size: 12px;
            font-weight: 700;
            margin-top: 6px;
        }

        /* ===== LONG-PRESS SPEED PILL ===== */
        .speed-pill {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 201;
            pointer-events: none;
        }

        .speed-pill.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .speed-pill svg {
            width: 18px;
            height: 18px;
            fill: #E11D48;
        }

        /* ===== HORIZONTAL SEEK INDICATOR ===== */
        .seek-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 28px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 201;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .seek-indicator.visible {
            opacity: 1;
        }

        .seek-indicator .seek-time {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
        }

        /* ===== LOCK OVERLAY ===== */
        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 300;
            display: none;
        }

        .lock-overlay.active {
            display: block;
        }

        .lock-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.35s ease, transform 0.2s ease;
        }

        .lock-btn.show {
            opacity: 0.85;
        }

        .lock-btn:active {
            transform: scale(0.88);
        }

        .lock-btn svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        /* ===== NEXT EPISODE OVERLAY ===== */
        .next-episode-overlay {
            position: absolute;
            bottom: 100px;
            right: 24px;
            z-index: 250;
            display: none;
            align-items: center;
            gap: 16px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px 20px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .next-episode-overlay.visible {
            display: flex;
        }

        .next-episode-overlay:active {
            transform: scale(0.96);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .next-ep-countdown {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.15);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .next-ep-countdown-fill {
            position: absolute;
            top: -3px;
            left: -3px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid #E11D48;
            border-right-color: transparent;
            border-bottom-color: transparent;
            transition: transform 0.1s linear;
        }

        .next-ep-countdown-text {
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .next-ep-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .next-ep-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .next-ep-title {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .next-ep-play-icon {
            width: 24px;
            height: 24px;
            fill: #E11D48;
        }

        .next-ep-cancel {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: color 0.2s ease;
        }

        .next-ep-cancel:hover {
            color: white;
        }

        /* ===== FULL-SCREEN AUTO-PLAY OVERLAY (video ended) ===== */
        .autoplay-fullscreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 400;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .autoplay-fullscreen.visible {
            display: flex;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .autoplay-ring {
            width: 100px;
            height: 100px;
            position: relative;
            cursor: pointer;
        }

        .autoplay-ring svg {
            width: 100px;
            height: 100px;
            transform: rotate(-90deg);
        }

        .autoplay-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 4;
        }

        .autoplay-ring-fill {
            fill: none;
            stroke: #E11D48;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            transition: stroke-dashoffset 0.3s linear;
        }

        .autoplay-ring-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            fill: white;
        }

        .autoplay-ring-count {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 700;
        }

        .autoplay-title {
            color: white;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .autoplay-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .autoplay-cancel {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 8px;
        }

        .autoplay-cancel:active {
            transform: scale(0.92);
        }

        .autoplay-cancel:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* ===== SVG MORPH PLAY/PAUSE ===== */
        .center-btn.play svg path {
            transition: d 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .center-btn.play {
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .center-btn.play:active {
            transform: scale(0.82);
        }

        /* Spring micro-animations on all control buttons */
        .ctrl-btn {
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        .ctrl-btn:active {
            transform: scale(0.85) !important;
        }

        .center-btn.skip {
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .center-btn.skip:active {
            transform: scale(0.82);
        }

        /* ===== SUBTITLE STYLING PANEL ===== */
        .subtitle-panel {
            position: absolute;
            bottom: 80px;
            right: 70px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            width: 220px;
            z-index: 100;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            transform: translateY(12px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
            overflow: hidden;
        }

        .subtitle-panel.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .sub-style-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .sub-style-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .sub-style-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
        }

        .sub-style-value {
            color: white;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sub-style-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease;
        }

        .sub-style-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ===== TOGGLE SWITCH ===== */
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s ease;
            flex-shrink: 0;
        }

        .toggle-switch.active {
            background: #E11D48;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .toggle-switch.active::after {
            transform: translateX(20px);
        }
    </style>
</head>

                    </svg>
                    <span class="menu-back-label">Aspect Ratio</span>
                </div>
                <div id="aspectOptionsList"></div>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-controls" id="controls">
            <div class="seek-bar-container" id="seekBarContainer">
                <div class="seek-bar" id="seekBar">
                    <div class="seek-buffer" id="seekBuffer"></div>
                    <div class="seek-progress" id="seekProgress"></div>
                    <div class="seek-thumb" id="seekThumb"></div>
                </div>
                <div class="seek-tooltip" id="seekTooltip">00:00</div>
            </div>

            <div class="controls-row">
                <div class="controls-left">
                    <button class="ctrl-btn" id="btnVolume" onclick="volumeToggle(event)">
                        <svg id="iconVolumeUp" viewBox="0 0 24 24">
                            <path
                                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                        </svg>
                        <svg id="iconVolumeMuted" class="icon-hidden" viewBox="0 0 24 24">
                            <path
                                d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                        </svg>
                    </button>
                    <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                </div>

                <div class="controls-right">
                    <!-- Subtitle Toggle -->
                    <button class="ctrl-btn" id="btnSubtitle" onclick="toggleSubtitlePanel(event)"
                        style="display:none;">

                            <path

                    <button class="ctrl-btn" onclick="toggleLock(event)">
