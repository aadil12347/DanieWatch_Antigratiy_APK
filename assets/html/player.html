                        </svg>
                    </button>
                    <!-- Speed -->
                    <button class="ctrl-btn"
                        onclick="showSubMenu('speed'); document.getElementById('settings-menu').classList.add('visible'); isMenuOpen=true; clearTimeout(controlsTimeout);">
                        <span class="speed-label" id="speedBtnLabel">1.0x</span>
                    </button>
                    <!-- Settings -->
                    <button class="ctrl-btn" id="btnSettings" onclick="toggleMenu(event)">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                        </svg>
                    </button>
                    <!-- Aspect Ratio Quick Toggle -->
                    <button class="ctrl-btn" onclick="cycleAspect(event)">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M19 12h-2v3h-3v2h5v-5zM7 9h3V7H5v5h2V9zm14-6H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const controlsBar = document.getElementById('controls');
        const dimmer = document.getElementById('dimmer');
        const topGradient = document.getElementById('topGradient');
        const headline = document.getElementById('headline');
        const centerControls = document.getElementById('centerControls');
        const seekProgress = document.getElementById('seekProgress');
        const seekBuffer = document.getElementById('seekBuffer');
        const seekThumb = document.getElementById('seekThumb');
        const seekBarContainer = document.getElementById('seekBarContainer');
        const seekBar = document.getElementById('seekBar');
        const seekTooltip = document.getElementById('seekTooltip');
        const timeDisplay = document.getElementById('timeDisplay');
        const iconPlayCenter = document.getElementById('iconPlayCenter');
        const iconPauseCenter = document.getElementById('iconPauseCenter');
        const iconVolumeUp = document.getElementById('iconVolumeUp');
        const iconVolumeMuted = document.getElementById('iconVolumeMuted');
        const videoContainer = document.getElementById('videoContainer');

        let hls = null;
        let isMenuOpen = false;
        let controlsTimeout;
        let isScrubbing = false;
        let lastScrubTime = 0;
        let controlsVisible = false;
        let isLocked = false;
        let isSubPanelOpen = false;

        // Data stores
        let audioTracks = [];
        let qualityLevels = [];
        let selectedAudioIndex = 0;
        let selectedQualityIndex = -1;
        let currentSpeed = 1.0;
        let currentAspect = 0; // 0=fit, 1=fill, 2=stretch
        const aspectModes = ['contain', 'fill', 'stretch'];
        const aspectLabels = ['Fit', 'Fill', 'Stretch'];

        // Subtitle state
        let subtitlesEnabled = true;
        let subtitleSize = 18;
        let subColorIndex = 0;
        const subColors = ['white', '#FFD700', '#00FF00', '#00BFFF'];
        const subColorNames = ['White', 'Yellow', 'Green', 'Cyan'];
        let subBgIndex = 0;
        const subBgs = ['rgba(0,0,0,0.6)', 'rgba(0,0,0,0.9)', 'transparent'];
        const subBgNames = ['Semi-Black', 'Dark', 'None'];

        // Resume playback
        let currentVideoUrl = '';

        // Next episode
        let nextEpisodeTitle = '';
        let nextEpisodeTimer = null;
        let autoplayTimer = null;
        let autoplayCount = 5;
        let nextEpCountdown = 5;
        let nextEpTriggered = false;
        let mediaType = 'movie';

        // Speed options
        const speedOptions = [0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 3.0];

        // ===== BACK BUTTON =====
        function goBack(e) {
            if (e) e.stopPropagation();
            savePlaybackPosition();
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('goBack');
            }
        }

        // ===== PIP MODE =====
        function enterPipMode(e) {
            if (e) e.stopPropagation();
            var pos = video ? video.currentTime : 0;
            var dur = video ? video.duration : 0;
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('enterPipMode', JSON.stringify({
                    currentTime: pos,
                    duration: dur,
                    url: currentVideoUrl
                }));
            }
        }

        // ===== EPISODES =====
        function showEpisodes(e) {
            if (e) e.stopPropagation();
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('showEpisodes');
            }
        }

        window.setMediaType = function (type) {
            mediaType = type || 'movie';
            const btn = document.getElementById('btnEpisodes');
            if (type && type.toLowerCase() !== 'movie') {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        };

        // ===== RESUME PLAYBACK =====
        // ===== HAPTIC FEEDBACK =====
        function haptic(type) {
            try {
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('haptic', type || 'light');
                }
            } catch (e) { }
        }

        function savePlaybackPosition() {
            if (currentVideoUrl && video.currentTime > 5 && video.duration && (video.duration - video.currentTime) > 10) {
                try { localStorage.setItem('resume_' + hashUrl(currentVideoUrl), JSON.stringify({ time: video.currentTime, duration: video.duration, ts: Date.now() })); } catch (e) { }
                // Report to Flutter for Continue Watching
                try {
                    if (window.flutter_inappwebview) {
                        window.flutter_inappwebview.callHandler('saveWatchProgress', JSON.stringify({
                            currentTime: video.currentTime,
                            duration: video.duration
                        }));
                    }
                } catch (e) { }
            }
        }

        function restorePlaybackPosition() {
            if (!currentVideoUrl) return;
            try {
                const saved = localStorage.getItem('resume_' + hashUrl(currentVideoUrl));
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.time > 5) {
                        video.currentTime = data.time;
                    }
                }
            } catch (e) { }
        }

        function hashUrl(url) {
            let hash = 0;
            for (let i = 0; i < url.length; i++) {
                const char = url.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0;
            }
            return Math.abs(hash).toString(36);
        }

        // Auto-save every 5 seconds
        setInterval(savePlaybackPosition, 5000);

        // ===== GESTURE SYSTEM =====
        let gestureActive = false;
        let gestureType = null; // 'brightness', 'volume', 'seek', null
        let gestureStartX = 0;
        let gestureStartY = 0;
        let gestureStartTime = 0;
        let gestureBrightness = 1.0; // 0-1
        let gestureVolume = 1.0;
        let gestureSeekStart = 0;
        let longPressTimer = null;
        let isLongPress = false;
        let longPressSpeed = 1.0;

        videoContainer.addEventListener('touchstart', onTouchStart, { passive: true });
        videoContainer.addEventListener('touchmove', onTouchMove, { passive: false });
        videoContainer.addEventListener('touchend', onTouchEnd, { passive: true });

        // ===== DOUBLE-TAP SKIP =====
        let lastTapTime = 0;
        let lastTapSide = null;
        let tapTimeout = null;

        function onTouchStart(e) {
            if (isLocked) return;
            if (e.touches.length >= 2) return; // Don't start single-finger gestures when two fingers are down
            if (e.target.closest('.ctrl-btn, .back-btn, .center-btn, .seek-bar-container, #settings-menu, .subtitle-panel, .next-episode-overlay, .lock-btn')) return;

            const touch = e.touches[0];
            gestureStartX = touch.clientX;
            gestureStartY = touch.clientY;
            gestureStartTime = Date.now();
            gestureType = null;
            gestureActive = false;
            gestureSeekStart = video.currentTime || 0;
            gestureVolume = video.volume;

            // Long-press detection
            longPressTimer = setTimeout(() => {
                isLongPress = true;
                longPressSpeed = 2.0;
                video.playbackRate = longPressSpeed;
                document.getElementById('speedPill').classList.add('visible');
            }, 500);
        }

        function onTouchMove(e) {
            if (isLocked) return;
            if (e.touches.length >= 2) {
                // Two fingers detected — cancel any ongoing single-finger gesture
                if (gestureActive) {
                    gestureActive = false;
                    gestureType = null;
                    document.getElementById('seekIndicator').classList.remove('visible');
                    document.getElementById('brightnessIndicator').classList.remove('visible');
                    document.getElementById('volumeIndicator').classList.remove('visible');
                }
                return;
            }
            if (e.target.closest('.ctrl-btn, .back-btn, .center-btn, .seek-bar-container, #settings-menu, .subtitle-panel, .next-episode-overlay, .lock-btn')) return;

            // Cancel long-press if user moves
            if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
            if (isLongPress) return; // Don't process gestures during long-press

            const touch = e.touches[0];
            const dx = touch.clientX - gestureStartX;
            const dy = touch.clientY - gestureStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            // Determine gesture type on first significant move
            if (!gestureType && (absDx > 15 || absDy > 15)) {
                if (absDy > absDx) {
                    // Vertical gesture
                    const rect = videoContainer.getBoundingClientRect();
                    const x = gestureStartX - rect.left;
                    const half = rect.width / 2;
                    gestureType = x < half ? 'brightness' : 'volume';
                } else {
                    gestureType = 'seek';
                }
                gestureActive = true;
                // Cancel tap detection
                if (tapTimeout) { clearTimeout(tapTimeout); tapTimeout = null; }
            }

            if (!gestureActive) return;
            e.preventDefault();

            if (gestureType === 'brightness') {
                const rect = videoContainer.getBoundingClientRect();
                const sensitivity = 1.5 / rect.height;
                gestureBrightness = Math.max(0, Math.min(1, gestureBrightness + (-dy * sensitivity * 0.3)));
                // We approximate brightness via a CSS filter
                video.style.filter = 'brightness(' + (0.2 + gestureBrightness * 0.8) + ')';
                const indicator = document.getElementById('brightnessIndicator');
                const fill = document.getElementById('brightnessFill');
                const label = document.getElementById('brightnessLabel');
                indicator.classList.add('visible');
                fill.style.height = (gestureBrightness * 100) + '%';
                label.textContent = Math.round(gestureBrightness * 100) + '%';
                gestureStartY = touch.clientY;
            } else if (gestureType === 'volume') {
                const rect = videoContainer.getBoundingClientRect();
                const sensitivity = 1.5 / rect.height;
                gestureVolume = Math.max(0, Math.min(1, gestureVolume + (-dy * sensitivity * 0.3)));
                video.volume = gestureVolume;
                video.muted = gestureVolume <= 0.01;
                const indicator = document.getElementById('volumeIndicator');
                const fill = document.getElementById('volumeFill');
                const label = document.getElementById('volumeLabel');
                indicator.classList.add('visible');
                fill.style.height = (gestureVolume * 100) + '%';
                label.textContent = Math.round(gestureVolume * 100) + '%';
                // Update volume icon
                if (gestureVolume <= 0.01) {
                    iconVolumeUp.classList.add('icon-hidden');
                    iconVolumeMuted.classList.remove('icon-hidden');
                } else {
                    iconVolumeUp.classList.remove('icon-hidden');
                    iconVolumeMuted.classList.add('icon-hidden');
                }
                gestureStartY = touch.clientY;
            } else if (gestureType === 'seek') {
                isScrubbing = true;
                showControls();
                seekBarContainer.classList.add('scrubbing');

                const rect = videoContainer.getBoundingClientRect();
                const seekSensitivity = (video.duration || 300) / rect.width * 0.5;
                const seekDelta = dx * seekSensitivity;
                const newTime = Math.max(0, Math.min(video.duration || 0, gestureSeekStart + seekDelta));
                const deltaSign = seekDelta >= 0 ? '+' : '-';
                const absDelta = Math.abs(newTime - gestureSeekStart);

                const indicator = document.getElementById('seekIndicator');
                const deltaEl = document.getElementById('seekDelta');
                const previewEl = document.getElementById('seekTimePreview');
                indicator.classList.add('visible');
                deltaEl.textContent = deltaSign + formatTime(absDelta);
                deltaEl.style.color = seekDelta >= 0 ? '#E11D48' : '#60a5fa';
                previewEl.textContent = formatTime(newTime);

                const percent = (newTime / video.duration) * 100;
                seekProgress.style.width = percent + '%';
                seekThumb.style.left = percent + '%';
                timeDisplay.textContent = formatTime(newTime) + ' / ' + formatTime(video.duration);
                
                const tooltipAreaWidth = seekBar.getBoundingClientRect().width;
                const tooltipPosX = (percent / 100) * tooltipAreaWidth;
                seekTooltip.textContent = formatTime(newTime);
                seekTooltip.style.left = percent + '%';
                seekTooltip.classList.add('visible');
            }
        }

        let lockHideTimer = null;
        let wasPinching = false;
        function onTouchEnd(e) {
            // If we were pinching, skip all single-finger gesture/tap processing
            if (wasPinching) {
                wasPinching = false;
                gestureActive = false;
                gestureType = null;
                return;
            }

            if (isLocked) {
                // Show lock button on tap at top-left, then auto-hide after 3s
                const lockBtn = document.getElementById('lockBtn');
                lockBtn.classList.add('show');
                if (lockHideTimer) clearTimeout(lockHideTimer);
                lockHideTimer = setTimeout(() => { lockBtn.classList.remove('show'); }, 3000);
                return;
            }

            // Clear long-press
            if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
            if (isLongPress) {
                isLongPress = false;
                video.playbackRate = currentSpeed;
                document.getElementById('speedPill').classList.remove('visible');
                return;
            }

            // Hide gesture indicators
            document.getElementById('brightnessIndicator').classList.remove('visible');
            document.getElementById('volumeIndicator').classList.remove('visible');

            if (gestureType === 'seek' && gestureActive) {
                const touch = e.changedTouches[0];
                const dx = touch.clientX - gestureStartX;
                const rect = videoContainer.getBoundingClientRect();
                const seekSensitivity = (video.duration || 300) / rect.width * 0.5;
                const seekDelta = dx * seekSensitivity;
                video.currentTime = Math.max(0, Math.min(video.duration || 0, gestureSeekStart + seekDelta));
                
                document.getElementById('seekIndicator').classList.remove('visible');
                isScrubbing = false;
                seekBarContainer.classList.remove('scrubbing');
                seekTooltip.classList.remove('visible');
                
                gestureActive = false;
                gestureType = null;
                return;
            }

            document.getElementById('seekIndicator').classList.remove('visible');

            if (gestureActive) {
                gestureActive = false;
                gestureType = null;
                return;
            }

            // Handle tap (single/double)
            if (e.target.closest('.ctrl-btn, .back-btn, .center-btn, .seek-bar-container, #settings-menu, .subtitle-panel, .next-episode-overlay, .lock-btn')) return;

            const touch = e.changedTouches[0];
            const rect = videoContainer.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const half = rect.width / 2;
            const side = x < half ? 'left' : 'right';
            const now = Date.now();

            if (now - lastTapTime < 350 && lastTapSide === side) {
                clearTimeout(tapTimeout);
                triggerSkip(side);
                lastTapTime = 0;
                lastTapSide = null;
            } else {
                lastTapTime = now;
                lastTapSide = side;
                tapTimeout = setTimeout(() => {
                    toggleControls();
                    lastTapTime = 0;
                    lastTapSide = null;
                }, 350);
            }

            gestureActive = false;
            gestureType = null;
        }

        function triggerSkip(side) {
            const ripple = document.getElementById(side === 'left' ? 'skipLeft' : 'skipRight');
            if (side === 'left') {
                video.currentTime = Math.max(0, video.currentTime - 15);
            } else {
                video.currentTime = Math.min(video.duration || 0, video.currentTime + 15);
            }
            ripple.classList.remove('active');
            void ripple.offsetWidth;
            ripple.classList.add('active');
            setTimeout(() => ripple.classList.remove('active'), 600);
        }

        // ===== HLS LOADING =====
        function loadVideo(url) {
            currentVideoUrl = url;
            nextEpTriggered = false;
            if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }
            document.getElementById('nextEpisodeOverlay').classList.remove('visible');

            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: true, lowLatencyMode: true });
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_LOADED, (e, data) => {
                    setupAudioPicker(data.audioTracks);
                    setupQualityPicker(data.levels);
                    // Check for subtitles
                    if (data.subtitles && data.subtitles.length > 0) {
                        document.getElementById('btnSubtitle').style.display = 'flex';
                    }
                });

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    hideLoader();
                    // Restore saved position
                    setTimeout(restorePlaybackPosition, 300);
                });

                hls.on(Hls.Events.SUBTITLE_TRACKS_UPDATED, (e, data) => {
                    if (data.subtitleTracks && data.subtitleTracks.length > 0) {
                        document.getElementById('btnSubtitle').style.display = 'flex';
                    }
                });

                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                            case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                            default: hls.destroy(); break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }

        // ===== PLAY / PAUSE WITH SVG MORPH =====
        const playPath = 'M8 5v14l11-7z';
        const pausePath = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

        function playPause(e) {
            if (e) e.stopPropagation();
            haptic('light');
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
            showControls();
        }

        function morphPlayPause(isPlaying) {
            const playEl = document.querySelector('#iconPlayCenter path');
            const pauseEl = document.querySelector('#iconPauseCenter path');
            if (isPlaying) {
                iconPlayCenter.classList.add('icon-hidden');
                iconPauseCenter.classList.remove('icon-hidden');
            } else {
                iconPlayCenter.classList.remove('icon-hidden');
                iconPauseCenter.classList.add('icon-hidden');
            }
        }

        video.addEventListener('play', () => morphPlayPause(true));
        video.addEventListener('pause', () => morphPlayPause(false));

        // ===== FORWARD & BACK =====
        function forward(e) { if (e) e.stopPropagation(); haptic('light'); video.currentTime += 10; showControls(); }
        function back(e) { if (e) e.stopPropagation(); haptic('light'); video.currentTime -= 10; showControls(); }

        // ===== VOLUME =====
        function volumeToggle(e) {
            if (e) e.stopPropagation();
            if (video.muted) {
                video.muted = false;
                iconVolumeUp.classList.remove('icon-hidden');
                iconVolumeMuted.classList.add('icon-hidden');
            } else {
                video.muted = true;
                iconVolumeUp.classList.add('icon-hidden');
                iconVolumeMuted.classList.remove('icon-hidden');
            }
            showControls();
        }

        // ===== ASPECT RATIO =====
        function cycleAspect(e) {
            if (e) e.stopPropagation();
            currentAspect = (currentAspect + 1) % aspectModes.length;
            applyAspect();
            showNotify(aspectLabels[currentAspect]);
            showControls();
        }

        function applyAspect() {
            video.classList.remove('aspect-fill', 'aspect-stretch', 'aspect-contain');
            if (currentAspect === 0) video.classList.add('aspect-contain');
            else if (currentAspect === 1) video.classList.add('aspect-fill');
            else if (currentAspect === 2) video.classList.add('aspect-stretch');
            document.getElementById('aspectValueText').textContent = aspectLabels[currentAspect];
        }

        // ===== LOCK =====
        function toggleLock(e) {
            if (e) e.stopPropagation();
            haptic('medium');
            isLocked = !isLocked;
            const overlay = document.getElementById('lockOverlay');
            const lockBtn = document.getElementById('lockBtn');
            if (isLocked) {
                hideUI();
                overlay.classList.add('active');
                showNotify('Screen Locked');
                lockBtn.classList.add('show');
                if (lockHideTimer) clearTimeout(lockHideTimer);
                lockHideTimer = setTimeout(() => { lockBtn.classList.remove('show'); }, 3000);
            } else {
                overlay.classList.remove('active');
                lockBtn.classList.remove('show');
                showControls();
                showNotify('Screen Unlocked');
            }
        }

        // ===== SPEED =====
        function setSpeed(speed) {
            currentSpeed = speed;
            video.playbackRate = speed;
            document.getElementById('speedValueText').textContent = speed + 'x';
            document.getElementById('speedBtnLabel').textContent = speed + 'x';
            renderSpeedOptions();
            setTimeout(showMainMenu, 200);
        }

        function renderSpeedOptions() {
            const list = document.getElementById('speedOptionsList');
            list.innerHTML = '';
            speedOptions.forEach((s) => {
                const el = document.createElement('div');
                el.className = 'menu-option' + (currentSpeed === s ? ' selected' : '');
                el.innerHTML = '<span class="menu-option-text">' + s + 'x</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                el.onclick = () => setSpeed(s);
                list.appendChild(el);
            });
        }

        // ===== ASPECT RATIO MENU =====
        function selectAspect(index) {
            currentAspect = index;
            applyAspect();
            renderAspectOptions();
            setTimeout(showMainMenu, 200);
        }

        function renderAspectOptions() {
            const list = document.getElementById('aspectOptionsList');
            list.innerHTML = '';
            aspectLabels.forEach((label, i) => {
                const el = document.createElement('div');
                el.className = 'menu-option' + (currentAspect === i ? ' selected' : '');
                el.innerHTML = '<span class="menu-option-text">' + label + '</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                el.onclick = () => selectAspect(i);
                list.appendChild(el);
            });
        }

        // ===== SUBTITLE CONTROLS =====
        function toggleSubtitlePanel(e) {
            if (e) e.stopPropagation();
            isSubPanelOpen = !isSubPanelOpen;
            const panel = document.getElementById('subtitlePanel');
            if (isSubPanelOpen) {
                panel.classList.add('visible');
                clearTimeout(controlsTimeout);
            } else {
                panel.classList.remove('visible');
                startHideTimer();
            }
        }

        function toggleSubtitles() {
            subtitlesEnabled = !subtitlesEnabled;
            const toggle = document.getElementById('subToggleSwitch');
            if (subtitlesEnabled) {
                toggle.classList.add('active');
            } else {
                toggle.classList.remove('active');
            }
            // Toggle subtitle track in hls
            if (hls) {
                hls.subtitleDisplay = subtitlesEnabled;
                if (!subtitlesEnabled) hls.subtitleTrack = -1;
                else if (hls.subtitleTracks && hls.subtitleTracks.length > 0) hls.subtitleTrack = 0;
            }
            // Toggle native text tracks
            for (let i = 0; i < video.textTracks.length; i++) {
                video.textTracks[i].mode = subtitlesEnabled ? 'showing' : 'hidden';
            }
        }

        function changeSubSize(delta) {
            subtitleSize = Math.max(10, Math.min(32, subtitleSize + delta));
            document.getElementById('subSizeLabel').textContent = subtitleSize;
            applySubtitleStyle();
        }

        function cycleSubColor() {
            subColorIndex = (subColorIndex + 1) % subColors.length;
            document.getElementById('subColorLabel').textContent = subColorNames[subColorIndex];
            applySubtitleStyle();
        }

        function cycleSubBg() {
            subBgIndex = (subBgIndex + 1) % subBgs.length;
            document.getElementById('subBgLabel').textContent = subBgNames[subBgIndex];
            applySubtitleStyle();
        }

        function applySubtitleStyle() {
            // Apply via ::cue styling dynamically
            let style = document.getElementById('sub-style-tag');
            if (!style) {
                style = document.createElement('style');
                style.id = 'sub-style-tag';
                document.head.appendChild(style);
            }
            style.textContent = 'video::cue { color: ' + subColors[subColorIndex] + '; font-size: ' + subtitleSize + 'px; background: ' + subBgs[subBgIndex] + '; font-family: Inter, sans-serif; }';
        }

        // ===== NOTIFY PILL =====
        function showNotify(text) {
            const pill = document.getElementById('notifyPill');
            pill.textContent = text;
            pill.style.opacity = '1';
            setTimeout(() => { pill.style.opacity = '0'; }, 1500);
        }

        // ===== TIME FORMAT =====
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '00:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const mm = String(m).padStart(2, '0');
            const ss = String(s).padStart(2, '0');
            if (h > 0) return String(h) + ':' + mm + ':' + ss;
            return mm + ':' + ss;
        }

        // ===== TIME UPDATE =====
        video.addEventListener('timeupdate', () => {
            if (isScrubbing) return;
            const perc = (video.currentTime / video.duration) * 100;
            seekProgress.style.width = perc + '%';
            seekThumb.style.left = perc + '%';
            timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);

            // Next episode check (last 30 seconds for TV shows)
            if (mediaType && mediaType.toLowerCase() !== 'movie' && video.duration && !nextEpTriggered) {
                const remaining = video.duration - video.currentTime;
                if (remaining < 30 && remaining > 0) {
                    triggerNextEpisodeCountdown();
                }
            }
        });

        // ===== BUFFER UPDATE =====
        video.addEventListener('progress', () => {
            if (video.buffered.length > 0) {
                const bufEnd = video.buffered.end(video.buffered.length - 1);
                const bufPerc = (bufEnd / video.duration) * 100;
                seekBuffer.style.width = bufPerc + '%';
            }
        });

        // ===== SEEK BAR =====
        function getSeekPercent(e) {
            const rect = seekBar.getBoundingClientRect();
            let clientX;
            if (e.touches && e.touches.length > 0) clientX = e.touches[0].clientX;
            else if (e.changedTouches && e.changedTouches.length > 0) clientX = e.changedTouches[0].clientX;
            else clientX = e.clientX;
            if (clientX === undefined) return -1;
            return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        }

        seekBarContainer.addEventListener('mousedown', startScrub);
        seekBarContainer.addEventListener('touchstart', startScrub, { passive: true });

        function startScrub(e) {
            e.stopPropagation();
            isScrubbing = true;
            seekBarContainer.classList.add('scrubbing');
            updateScrub(e);
            document.addEventListener('mousemove', updateScrub);
            document.addEventListener('mouseup', endScrub);
            document.addEventListener('touchmove', updateScrub, { passive: true });
            document.addEventListener('touchend', endScrub);
        }

        function updateScrub(e) {
            if (!isScrubbing) return;
            const pct = getSeekPercent(e);
            if (pct < 0) return;
            const p = pct * 100;
            seekProgress.style.width = p + '%';
            seekThumb.style.left = p + '%';
            const previewTime = pct * (video.duration || 0);
            seekTooltip.textContent = formatTime(previewTime);
            seekTooltip.style.left = p + '%';
            seekTooltip.classList.add('visible');
            timeDisplay.textContent = formatTime(previewTime) + ' / ' + formatTime(video.duration);
        }

        function endScrub(e) {
            if (!isScrubbing) return;
            const pct = getSeekPercent(e);
            if (pct >= 0) video.currentTime = pct * (video.duration || 0);
            isScrubbing = false;
            lastScrubTime = Date.now();
            seekBarContainer.classList.remove('scrubbing');
            seekTooltip.classList.remove('visible');
            document.removeEventListener('mousemove', updateScrub);
            document.removeEventListener('mouseup', endScrub);
            document.removeEventListener('touchmove', updateScrub);
            document.removeEventListener('touchend', endScrub);
            showControls();
        }

        seekBarContainer.addEventListener('click', function (e) {
            e.stopPropagation();
            if (Date.now() - lastScrubTime < 300) return;
            const pct = getSeekPercent(e);
            if (pct >= 0) video.currentTime = pct * (video.duration || 0);
            showControls();
        });

        // ===== SETTINGS MENU =====
        function toggleMenu(e) {
            if (e) e.stopPropagation();
            const menu = document.getElementById('settings-menu');
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                showMainMenu();
                menu.classList.add('visible');
                clearTimeout(controlsTimeout);
            } else {
                menu.classList.remove('visible');
                startHideTimer();
            }
        }

        function showMainMenu() {
            document.getElementById('menuMain').classList.remove('hidden-view');
            document.getElementById('menuQuality').classList.remove('active-view');
            document.getElementById('menuAudio').classList.remove('active-view');
            document.getElementById('menuSpeed').classList.remove('active-view');
            document.getElementById('menuAspect').classList.remove('active-view');
        }

        function showSubMenu(type) {
            document.getElementById('menuMain').classList.add('hidden-view');
            if (type === 'quality') document.getElementById('menuQuality').classList.add('active-view');
            else if (type === 'audio') document.getElementById('menuAudio').classList.add('active-view');
            else if (type === 'speed') { document.getElementById('menuSpeed').classList.add('active-view'); renderSpeedOptions(); }
            else if (type === 'aspect') { document.getElementById('menuAspect').classList.add('active-view'); renderAspectOptions(); }
        }

        function selectQuality(index) {
            selectedQualityIndex = index;
            hls.currentLevel = index;
            const text = index === -1 ? 'Auto' : qualityLevels[index].height + 'p';
            document.getElementById('qualityValueText').textContent = text;
            renderQualityOptions();
            setTimeout(showMainMenu, 200);
        }

        function selectAudio(index) {
            selectedAudioIndex = index;
            hls.audioTrack = index;
            const track = audioTracks[index];
            document.getElementById('audioValueText').textContent = track.name || track.lang || ('Audio ' + (index + 1));
            renderAudioOptions();
            setTimeout(showMainMenu, 200);
        }

        function renderQualityOptions() {
            const list = document.getElementById('qualityOptionsList');
            list.innerHTML = '';
            const autoEl = document.createElement('div');
            autoEl.className = 'menu-option' + (selectedQualityIndex === -1 ? ' selected' : '');
            autoEl.innerHTML = '<span class="menu-option-text">Auto</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
            autoEl.onclick = () => selectQuality(-1);
            list.appendChild(autoEl);
            qualityLevels.forEach((l, i) => {
                const el = document.createElement('div');
                el.className = 'menu-option' + (selectedQualityIndex === i ? ' selected' : '');
                el.innerHTML = '<span class="menu-option-text">' + l.height + 'p</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                el.onclick = () => selectQuality(i);
                list.appendChild(el);
            });
        }

        function renderAudioOptions() {
            const list = document.getElementById('audioOptionsList');
            list.innerHTML = '';
            audioTracks.forEach((t, i) => {
                const el = document.createElement('div');
                el.className = 'menu-option' + (selectedAudioIndex === i ? ' selected' : '');
                const label = t.name || t.lang || ('Audio ' + (i + 1));
                el.innerHTML = '<span class="menu-option-text">' + label + '</span><svg class="menu-option-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                el.onclick = () => selectAudio(i);
                list.appendChild(el);
            });
        }

        // ===== NEXT EPISODE =====
        function triggerNextEpisodeCountdown() {
            if (nextEpTriggered) return;
            nextEpTriggered = true;
            nextEpCountdown = 5;
            document.getElementById('nextEpCountdownText').textContent = nextEpCountdown;
            document.getElementById('nextEpisodeOverlay').classList.add('visible');

            nextEpisodeTimer = setInterval(() => {
                nextEpCountdown--;
                document.getElementById('nextEpCountdownText').textContent = nextEpCountdown;
                const deg = ((5 - nextEpCountdown) / 5) * 360;
                document.getElementById('nextEpCountdownFill').style.transform = 'rotate(' + deg + 'deg)';
                if (nextEpCountdown <= 0) {
                    clearInterval(nextEpisodeTimer);
                    playNextEpisode();
                }
            }, 1000);
        }

        function playNextEpisode() {
            if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }
            document.getElementById('nextEpisodeOverlay').classList.remove('visible');
            savePlaybackPosition();
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('playNextEpisode');
            }
        }

        function cancelNextEpisode(e) {
            if (e) { e.stopPropagation(); e.preventDefault(); }
            if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }
            document.getElementById('nextEpisodeOverlay').classList.remove('visible');
            nextEpTriggered = true; // Don't trigger again
        }



        // ===== CONTROL VISIBILITY (3s auto-hide) =====
        function showControls() {
            if (isLocked) return;
            clearTimeout(controlsTimeout);
            controlsVisible = true;
            controlsBar.classList.add('visible');
            dimmer.classList.add('visible');
            topGradient.classList.add('visible');
            headline.classList.add('visible');
            centerControls.classList.add('visible');
            if (!video.paused && !isMenuOpen && !isSubPanelOpen) {
                startHideTimer();
            }
        }

        function startHideTimer() {
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!video.paused && !isMenuOpen && !isSubPanelOpen && !isScrubbing) {
                    hideUI();
                }
            }, 3000);
        }

        function toggleControls() {
            if (controlsVisible) hideUI();
            else showControls();
        }

        function hideUI() {
            clearTimeout(controlsTimeout);
            controlsVisible = false;
            controlsBar.classList.remove('visible');
            dimmer.classList.remove('visible');
            topGradient.classList.remove('visible');
            headline.classList.remove('visible');
            centerControls.classList.remove('visible');
            if (isMenuOpen) {
                isMenuOpen = false;
                document.getElementById('settings-menu').classList.remove('visible');
            }
            if (isSubPanelOpen) {
                isSubPanelOpen = false;
                document.getElementById('subtitlePanel').classList.remove('visible');
            }
        }

        // ===== LOADERS =====
        function showLoader() { document.getElementById('player-loader').style.display = 'block'; }
        function hideLoader() { document.getElementById('player-loader').style.display = 'none'; }

        video.addEventListener('waiting', showLoader);
        video.addEventListener('canplay', hideLoader);

        // ===== SETUP PICKERS =====
        function setupAudioPicker(tracks) {
            if (!tracks || tracks.length < 1) return;
            audioTracks = tracks;
            selectedAudioIndex = 0;
            document.getElementById('audioMenuItem').classList.remove('hidden');
            document.getElementById('audioValueText').textContent = tracks[0].name || tracks[0].lang || 'Default';
            renderAudioOptions();
        }

        function setupQualityPicker(levels) {
            if (!levels || levels.length < 1) return;
            qualityLevels = levels;
            selectedQualityIndex = -1;
            document.getElementById('qualityMenuItem').classList.remove('hidden');
            document.getElementById('qualityValueText').textContent = 'Auto';
            renderQualityOptions();
        }

        // ===== VIDEO ENDED — FULL-SCREEN AUTO-PLAY =====
        video.addEventListener('ended', () => {
            savePlaybackPosition();
            if (mediaType && mediaType.toLowerCase() !== 'movie' && nextEpisodeTitle) {
                showAutoplayOverlay();
            }
        });

        function showAutoplayOverlay() {
            // Hide the small card overlay if visible
            document.getElementById('nextEpisodeOverlay').classList.remove('visible');
            if (nextEpisodeTimer) { clearInterval(nextEpisodeTimer); nextEpisodeTimer = null; }

            autoplayCount = 5;
            const overlay = document.getElementById('autoplayFullscreen');
            const ring = document.getElementById('autoplayRingFill');
            const countText = document.getElementById('autoplayCountText');
            const titleEl = document.getElementById('autoplayTitle');

            titleEl.textContent = nextEpisodeTitle || 'Next Episode';
            countText.textContent = autoplayCount;
            ring.style.strokeDashoffset = '283';
            overlay.classList.add('visible');
            haptic('medium');

            autoplayTimer = setInterval(() => {
                autoplayCount--;
                countText.textContent = autoplayCount;
                // 283 is the circumference of r=45 circle (2 * PI * 45)
                const progress = (5 - autoplayCount) / 5;
                ring.style.strokeDashoffset = (283 * (1 - progress)).toString();

                if (autoplayCount <= 0) {
                    clearInterval(autoplayTimer);
                    autoplayTimer = null;
                    overlay.classList.remove('visible');
                    playNextEpisode();
                }
            }, 1000);
        }

        function cancelAutoplay(e) {
            if (e) { e.stopPropagation(); e.preventDefault(); }
            haptic('light');
            if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
            document.getElementById('autoplayFullscreen').classList.remove('visible');
        }

        // ===== PINCH-TO-ZOOM =====
        let pinchStartDist = 0;
        let pinchStartScale = 1;
        let currentZoom = 1;
        let panX = 0, panY = 0;
        let lastPanX = 0, lastPanY = 0;
        let isPinching = false;

        function getPinchDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        videoContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isPinching = true;
                video.classList.add('zooming');
                pinchStartDist = getPinchDist(e.touches);
                pinchStartScale = currentZoom;
                lastPanX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                lastPanY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
        }, { passive: true });

        videoContainer.addEventListener('touchmove', (e) => {
            if (!isPinching || e.touches.length < 2) return;
            e.preventDefault();
            const dist = getPinchDist(e.touches);
            currentZoom = Math.max(1, Math.min(4, pinchStartScale * (dist / pinchStartDist)));

            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            panX += (midX - lastPanX);
            panY += (midY - lastPanY);
            lastPanX = midX;
            lastPanY = midY;

            // Limit pan to avoid going too far
            const maxPan = (currentZoom - 1) * 150;
            panX = Math.max(-maxPan, Math.min(maxPan, panX));
            panY = Math.max(-maxPan, Math.min(maxPan, panY));

            video.style.transform = 'scale(' + currentZoom + ') translate(' + (panX / currentZoom) + 'px, ' + (panY / currentZoom) + 'px)';
        }, { passive: false });

        videoContainer.addEventListener('touchend', (e) => {
            if (isPinching && e.touches.length < 2) {
                isPinching = false;
                wasPinching = true; // Signal to single-finger onTouchEnd to skip
                video.classList.remove('zooming');
                // Snap back if close to 1x
                if (currentZoom < 1.1) {
                    currentZoom = 1;
                    panX = 0;
                    panY = 0;
                    video.style.transform = '';
                }
            }
        }, { passive: true });

        // Double-tap to reset zoom
        let zoomResetTap = 0;
        videoContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1 && currentZoom > 1) {
                const now = Date.now();
                if (now - zoomResetTap < 300) {
                    currentZoom = 1; panX = 0; panY = 0;
                    video.style.transform = '';
                    haptic('light');
                }
                zoomResetTap = now;
            }
        }, { passive: true });

        // ===== PUBLIC API =====
        window.playVideo = function (url) { loadVideo(url); };
        window.seekToPosition = function (seconds) {
            if (!seconds || seconds < 5) return;
            // If video is already ready, seek immediately
            if (video.readyState >= 2 && video.duration > 0) {
                video.currentTime = Math.min(seconds, video.duration - 5);
                return;
            }
            // Otherwise wait for canplay event
            var seekHandler = function () {
                video.removeEventListener('canplay', seekHandler);
                if (video.duration > 0) {
                    video.currentTime = Math.min(seconds, video.duration - 5);
                }
            };
            video.addEventListener('canplay', seekHandler);
        };
        window.videoTitle = function (title) {
            document.getElementById('episodeBadge').innerText = title;
        };
        window.updateEpisodeButton = function (text) {
            const btn = document.getElementById('btnEpisodes');
            const span = document.getElementById('episodeButtonText');
            if (span) span.textContent = text;
            if (btn) btn.classList.remove('hidden');
        };

        window.setNextEpisodeInfo = function (title) {
            nextEpisodeTitle = title || '';
            document.getElementById('nextEpTitle').textContent = title || 'Next Episode';
        };

        // Initialize speed and aspect options on load
        renderSpeedOptions();
        renderAspectOptions();
        applySubtitleStyle();

        // Initial state
        showControls();
    </script>
</body>

</html>
