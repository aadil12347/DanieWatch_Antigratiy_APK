name: native_muxer
description: Native Android MediaMuxer plugin for TS→MP4 conversion
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.daniewatch.native_muxer
        pluginClass: NativeMuxerPlugin
